{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODO Chaco - Acceso al Sistema</title>
    <link rel="icon" type="image/png" href="{% static 'custom/chaco/favicon.png' %}">

    <!-- Google Fonts — Manrope (única familia del sistema) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    borderRadius: { lg: '8px', xl: '12px', '2xl': '16px', full: '9999px' },
                }
            }
        }
    </script>

    <!-- CHACO Design Tokens — define todas las CSS variables -->
    <link rel="stylesheet" href="{% static 'custom/css/chaco-tokens.css' %}">

    <style>
        body { background: var(--bg-secondary); }

        /* Botón primario — Brand (gradiente de marca, pill) */
        .login-submit-btn {
            background: var(--gradient-brand);
            border: 1px solid transparent;
            color: var(--text-white);
            font-weight: 600;
            transition: filter .15s ease, box-shadow .15s ease, border-color .15s ease;
        }
        .login-submit-btn:hover {
            /* hover = overlay negro 20% encima del gradiente (spec) */
            box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.20);
        }
        .login-submit-btn:focus,
        .login-submit-btn:focus-visible {
            outline: none;
            border: 2px solid var(--border-brand);
            box-shadow: 0 1px 0 2px var(--border-base);
        }
        .login-submit-btn:disabled {
            background: var(--bg-disabled) !important;
            border: 1px solid var(--border-base) !important;
            color: var(--text-fg-disabled) !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        /* Inputs — focus de marca, el ring nunca se remueve */
        .login-input {
            height: 40px;
            background: var(--bg-white);
            border: 1px solid var(--border-base);
            color: var(--text-heading);
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        .login-input::placeholder { color: var(--text-body-subtle); }
        .login-input:focus {
            outline: none;
            border-color: var(--border-brand);
            box-shadow: var(--ring-brand, 0 0 0 3px rgba(80, 89, 188, 0.35));
        }
    </style>
</head>
<body class="min-h-screen flex font-sans">
    <div class="w-full h-screen flex">
        <!-- Izquierda — Ilustración (solo en desktop) -->
        <div class="hidden lg:flex lg:flex-1 items-center justify-center relative overflow-hidden" style="background: var(--bg-secondary);">
            <img src="{% static 'custom/chaco/login-background.png' %}" alt="" class="absolute right-0 w-[52%] h-full object-cover object-left opacity-90">
            <div class="relative z-10 flex items-center justify-center w-full h-full px-12">
                <img src="{% static 'custom/chaco/login-illustration.svg' %}" alt="" class="w-auto h-[520px] object-contain drop-shadow-2xl">
            </div>
        </div>

        <!-- Derecha — Formulario -->
        <div class="w-full lg:w-[560px] flex items-center justify-center px-8 lg:px-12" style="background: var(--bg-white);">
            <div class="w-full max-w-md py-8">
                <!-- Encabezado -->
                <div class="mb-10 text-center">
                    <h1 class="text-3xl font-extrabold mb-2 leading-tight" style="color: var(--text-heading); letter-spacing: -0.5px;">
                        Bienvenido Ñandé,
                    </h1>
                    <h2 class="text-3xl font-extrabold leading-tight" style="color: var(--text-heading); letter-spacing: -0.5px;">
                        Sistema Social de Chaco
                    </h2>
                </div>

                <!-- Tarjeta del formulario -->
                <div class="rounded-xl p-8 shadow-sm" style="background: var(--bg-white); border: 1px solid var(--border-base);">
                <form method="post" class="space-y-5" id="loginForm">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="flex items-start gap-2 rounded-lg p-3 mb-4" style="background: var(--bg-danger-soft); border: 1px solid var(--border-danger-subtle);">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 mt-px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-fg-danger);">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p class="text-sm font-semibold" style="color: var(--text-fg-danger);">Credenciales inválidas</p>
                    </div>
                    {% endif %}

                    <!-- Usuario -->
                    <div>
                        <label for="username" class="block text-[13px] font-semibold mb-2" style="color: var(--text-heading);">
                            Tu correo electrónico <span style="color: var(--text-fg-danger);">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2" style="color: var(--text-body-subtle);">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </svg>
                            </span>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   required
                                   class="login-input w-full pl-11 pr-4 rounded-lg text-sm font-normal"
                                   placeholder="Ingresá tu correo electrónico">
                        </div>
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label for="password" class="block text-[13px] font-semibold mb-2" style="color: var(--text-heading);">
                            Tu contraseña <span style="color: var(--text-fg-danger);">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2" style="color: var(--text-body-subtle);">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </span>
                            <input type="password"
                                   name="password"
                                   id="password"
                                   required
                                   class="login-input w-full pl-11 pr-11 rounded-lg text-sm font-normal"
                                   placeholder="••••••••••">
                            <button type="button"
                                    onclick="togglePassword()"
                                    aria-label="Mostrar u ocultar contraseña"
                                    class="absolute right-3.5 top-1/2 -translate-y-1/2 transition-colors"
                                    style="color: var(--text-body-subtle);">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toggleIcon">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Recordarme & Olvidaste -->
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="mr-2 rounded" style="accent-color: var(--bg-brand);" />
                            <span class="font-medium" style="color: var(--text-body);">Recordarme</span>
                        </label>
                        <button type="button" class="hover:underline font-semibold" style="color: var(--text-fg-brand);">
                            ¿Olvidaste tu contraseña?
                        </button>
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                            class="login-submit-btn w-full h-10 px-4 rounded-full text-sm mt-2">
                        Iniciar sesión
                    </button>
                </form>

                <!-- Registro -->
                <div class="text-center mt-6">
                    <span class="text-sm font-normal" style="color: var(--text-body-subtle);">¿No estás registrado? </span>
                    <a href="#" class="text-sm hover:underline font-semibold" style="color: var(--text-fg-brand);">Crear cuenta</a>
                </div>
                </div>

                <!-- Logo -->
                <div class="flex items-center justify-center mt-6">
                    <img src="{% static 'custom/chaco/login-logo.png' %}" alt="NODO Chaco" class="h-12">
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (password.type === 'password') {
                password.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                password.type = 'password';
                icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>
</html>
