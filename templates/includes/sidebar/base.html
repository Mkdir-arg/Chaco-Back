{% load static %}
<!-- ============================================================
     SIDEBAR — Chaco NODO Design System §14
     Mobile overlay + Desktop fixed (colapsable)
     ============================================================ -->

<!-- ── Mobile overlay (sidebarOpen) ─────────────────────────── -->
<div class="relative z-50 lg:hidden"
     x-show="sidebarOpen"
     style="display: none;"
     x-transition:enter="transition-opacity ease-linear duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition-opacity ease-linear duration-300"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0">

    <!-- Backdrop -->
    <div class="fixed inset-0 bg-gray-900/80" @click="sidebarOpen = false"></div>

    <div class="fixed inset-0 flex">
        <div class="relative mr-8 sm:mr-16 flex w-full max-w-xs sm:max-w-sm flex-1"
             x-transition:enter="transition ease-in-out duration-300 transform"
             x-transition:enter-start="-translate-x-full"
             x-transition:enter-end="translate-x-0"
             x-transition:leave="transition ease-in-out duration-300 transform"
             x-transition:leave-start="translate-x-0"
             x-transition:leave-end="-translate-x-full">

            <!-- Botón cerrar (fuera del panel) -->
            <div class="absolute left-full top-0 flex w-8 sm:w-16 justify-center pt-5">
                <button type="button" class="-m-2.5 p-2.5" @click="sidebarOpen = false" aria-label="Cerrar sidebar">
                    <span class="sr-only">Cerrar sidebar</span>
                    <!-- x-mark -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         width="24" height="24" aria-hidden="true" style="color: #fff;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Panel lateral móvil -->
            <div class="flex grow flex-col overflow-y-auto"
                 style="background: var(--bg-white); border-right: 1px solid var(--border-base);">

                <!-- Header de marca (móvil) -->
                <div style="padding: 16px; border-bottom: 1px solid var(--border-base);">
                    <div class="flex items-center gap-3">
                        <!-- Logo box 44×44 -->
                        <div class="flex items-center justify-center flex-shrink-0"
                             style="width: 44px; height: 44px; border-radius: 12px;
                                    background: var(--bg-white); border: 1px solid var(--border-base);">
                            <img src="{% static 'custom/chaco/mini-logo.png' %}"
                                 alt="" aria-hidden="true"
                                 style="width: 32px; height: 32px; object-fit: contain;">
                        </div>
                        <!-- Título y subtítulo -->
                        <div class="min-w-0">
                            <p style="font-size: 15px; font-weight: 800; color: var(--text-heading);
                                      line-height: 1.15; white-space: nowrap;">NODO Chaco</p>
                            <p style="font-size: 11.5px; color: var(--text-body-subtle);
                                      line-height: 1.3; white-space: nowrap;">Gobierno del Chaco</p>
                        </div>
                    </div>
                </div>

                <!-- Navegación móvil -->
                <nav class="flex flex-1 flex-col" style="padding: 12px;">
                    {% include 'includes/sidebar/opciones.html' %}
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- ── Desktop sidebar (fixed, colapsable) ───────────────────── -->
<div class="hidden lg:fixed lg:inset-y-0 lg:z-50 lg:flex lg:flex-col transition-all duration-300"
     :class="sidebarCollapsed ? 'lg:w-20' : 'lg:w-72'">

    <div class="flex grow flex-col h-full"
         style="background: var(--bg-white); border-right: 1px solid var(--border-base);">

        <!-- ── Header de marca ── -->
        <div style="border-bottom: 1px solid var(--border-base);">

            <!-- Expandido: logo box + título + subtítulo -->
            <template x-if="!sidebarCollapsed">
                <div style="padding: 16px;">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center justify-center flex-shrink-0"
                             style="width: 44px; height: 44px; border-radius: 12px;
                                    background: var(--bg-white); border: 1px solid var(--border-base);">
                            <img src="{% static 'custom/chaco/mini-logo.png' %}"
                                 alt="" aria-hidden="true"
                                 style="width: 32px; height: 32px; object-fit: contain;">
                        </div>
                        <div class="min-w-0">
                            <p style="font-size: 15px; font-weight: 800; color: var(--text-heading);
                                      line-height: 1.15; white-space: nowrap; overflow: hidden;
                                      text-overflow: ellipsis;">NODO Chaco</p>
                            <p style="font-size: 11.5px; color: var(--text-body-subtle);
                                      line-height: 1.3; white-space: nowrap; overflow: hidden;
                                      text-overflow: ellipsis;">Gobierno del Chaco</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Colapsado: solo logo box centrado -->
            <template x-if="sidebarCollapsed">
                <div style="padding: 16px; display: flex; justify-content: center;">
                    <div class="flex items-center justify-center"
                         style="width: 44px; height: 44px; border-radius: 12px;
                                background: var(--bg-white); border: 1px solid var(--border-base);">
                        <img src="{% static 'custom/chaco/mini-logo.png' %}"
                             alt="NODO Chaco"
                             style="width: 32px; height: 32px; object-fit: contain;">
                    </div>
                </div>
            </template>
        </div>

        <!-- ── Navegación ── -->
        <div class="flex-1 overflow-y-auto" style="padding: 12px;">
            {% include 'includes/sidebar/opciones.html' %}
        </div>

        <!-- ── Footer: botón Minimizar ── -->
        <div style="padding: 12px; border-top: 1px solid var(--border-base);">
            <button @click="sidebarCollapsed = !sidebarCollapsed"
                    class="w-full flex items-center justify-center gap-2 transition-colors duration-150"
                    style="background: var(--bg-secondary); border-radius: 9999px;
                           padding: 10px 14px; border: none; cursor: pointer;"
                    aria-label="Minimizar sidebar">

                <!-- Colapsado → apunta a la derecha (expandir) -->
                <template x-if="sidebarCollapsed">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         width="16" height="16" aria-hidden="true"
                         style="color: var(--text-body-subtle); flex-shrink: 0;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
                    </svg>
                </template>

                <!-- Expandido → apunta a la izquierda + label -->
                <template x-if="!sidebarCollapsed">
                    <div class="flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                             width="16" height="16" aria-hidden="true"
                             style="color: var(--text-body-subtle); flex-shrink: 0;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
                        </svg>
                        <span style="font-size: 13px; font-weight: 600;
                                     color: var(--text-body-subtle);">Minimizar</span>
                    </div>
                </template>
            </button>
        </div>

    </div>
</div>
