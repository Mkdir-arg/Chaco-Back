{% load static custom_filters rbac %}
{% with pagina_actual=request.resolver_match.route %}
<div class="flex flex-1 flex-col" style="gap: 0;">

    {# ── User card ──────────────────────────────────────────── #}
    <div style="margin-bottom: 8px;">

        {# Expandido: avatar + nombre + rol #}
        <template x-if="!sidebarCollapsed">
            <div style="padding: 14px 16px; border-bottom: 1px solid var(--border-base); margin-bottom: 4px;">
                <div class="flex items-center gap-2">
                    {# Avatar 36 sobre gradient-brand #}
                    <div class="flex items-center justify-center flex-shrink-0"
                         style="width: 36px; height: 36px; border-radius: 9999px;
                                background: var(--gradient-brand);">
                        <span style="font-size: 14px; font-weight: 700; color: #fff; line-height: 1;">
                            {{ request.user.get_full_name|default:request.user.username|first|upper }}
                        </span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p style="font-size: 13px; font-weight: 700;
                                  color: var(--text-heading); white-space: nowrap;
                                  overflow: hidden; text-overflow: ellipsis;">
                            {{ request.user.get_full_name|default:request.user.username }}
                        </p>
                        <p style="font-size: 11px; color: var(--text-body-subtle);
                                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            {% if request.user.groups.all %}
                                {{ request.user.groups.first.name }}
                            {% else %}
                                Sin grupo
                            {% endif %}
                        </p>
                    </div>
                </div>
            </div>
        </template>

        {# Colapsado: solo avatar centrado #}
        <template x-if="sidebarCollapsed">
            <div style="display: flex; justify-content: center;
                        padding: 14px 0; border-bottom: 1px solid var(--border-base);
                        margin-bottom: 4px;">
                <div class="flex items-center justify-center"
                     style="width: 36px; height: 36px; border-radius: 9999px;
                            background: var(--gradient-brand);"
                     title="{{ request.user.get_full_name|default:request.user.username }}">
                    <span style="font-size: 14px; font-weight: 700; color: #fff; line-height: 1;">
                        {{ request.user.get_full_name|default:request.user.username|first|upper }}
                    </span>
                </div>
            </div>
        </template>
    </div>

    {# Nav principal — colores blindados en el <style> de sidebar/base.html (.ds-snav) #}
    <nav class="ds-snav" style="display: flex; flex-direction: column; gap: 2px;">

        {# ── Inicio ─────────────────────────────────────────── #}
        <div class="relative" style="margin-bottom: 2px;">
            <a href="{% url 'core:inicio' %}"
               class="group flex items-center transition-colors duration-150"
               :class="sidebarCollapsed ? 'justify-center' : 'gap-x-3'"
               style="padding: 10px 14px; border-radius: 9999px; text-decoration: none;
                      {% if 'inicio' in pagina_actual %}
                          background: var(--bg-brand); color: #fff; font-weight: 700;
                      {% else %}
                          background: transparent; color: var(--text-body); font-weight: 500;
                      {% endif %}
                      font-size: 13.5px; font-family: var(--font-sans);"
               {% if 'inicio' in pagina_actual %}aria-current="page"{% endif %}>
                {# home icon #}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                     width="20" height="20" aria-hidden="true" class="flex-shrink-0"
                     style="color: {% if 'inicio' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.5a.75.75 0 0 0 .75.75h4.5a.75.75 0 0 0 .75-.75V15a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75v5.25c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75V9.75M8.25 21h8.25"/>
                </svg>
                <template x-if="!sidebarCollapsed">
                    <span>Inicio</span>
                </template>
            </a>
        </div>

        {# ── Dashboard (grupo colapsable) ─────────────────────── #}
        {% if request.user|puede:"dashboard.ver" %}
        <div x-data="{ open: {% if 'dashboard-contactos' in pagina_actual or 'conversaciones/metricas' in pagina_actual %}true{% else %}false{% endif %} }"
             class="relative" style="margin-bottom: 2px;">

            {# Expandido: botón grupo + subítems #}
            <template x-if="!sidebarCollapsed">
                <div>
                    <button @click="open = !open"
                            class="group flex w-full items-center gap-x-3 transition-colors duration-150"
                            style="padding: 10px 14px; border-radius: 9999px; border: none; cursor: pointer;
                                   background: transparent; color: var(--text-body); font-weight: 500;
                                   font-size: 13.5px; font-family: var(--font-sans); text-align: left;">
                        {# squares icon #}
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                             width="20" height="20" aria-hidden="true" class="flex-shrink-0"
                             style="color: var(--text-body-subtle);">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/>
                        </svg>
                        <span class="flex-1">Dashboard</span>
                        {# chevron-down, rota cuando abierto #}
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                             width="14" height="14" aria-hidden="true"
                             style="color: var(--text-body-subtle); transition: transform 150ms;"
                             :style="open ? 'transform: rotate(180deg)' : ''">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
                        </svg>
                    </button>

                    {# Subítems #}
                    <div x-show="open" x-transition style="margin-top: 2px; margin-left: 20px; display: flex; flex-direction: column; gap: 2px;">
                        <a href="{% url 'legajos:dashboard_contactos' %}"
                           class="flex items-center gap-2 transition-colors duration-150"
                           style="padding: 8px 12px; border-radius: 9999px; text-decoration: none; font-size: 13px; font-family: var(--font-sans);
                                  {% if 'dashboard-contactos' in pagina_actual %}
                                      background: var(--bg-brand); color: #fff; font-weight: 700;
                                  {% else %}
                                      background: transparent; color: var(--text-body-subtle); font-weight: 500;
                                  {% endif %}"
                           {% if 'dashboard-contactos' in pagina_actual %}aria-current="page"{% endif %}>
                            {# chart-bar icon pequeño #}
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                 width="16" height="16" aria-hidden="true" class="flex-shrink-0"
                                 style="color: {% if 'dashboard-contactos' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/>
                            </svg>
                            Dashboard Contactos
                        </a>
                        <a href="{% url 'conversaciones:metricas' %}"
                           class="flex items-center gap-2 transition-colors duration-150"
                           style="padding: 8px 12px; border-radius: 9999px; text-decoration: none; font-size: 13px; font-family: var(--font-sans);
                                  {% if 'conversaciones/metricas' in pagina_actual %}
                                      background: var(--bg-brand); color: #fff; font-weight: 700;
                                  {% else %}
                                      background: transparent; color: var(--text-body-subtle); font-weight: 500;
                                  {% endif %}"
                           {% if 'conversaciones/metricas' in pagina_actual %}aria-current="page"{% endif %}>
                            {# chat-bubble / megaphone icon #}
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                 width="16" height="16" aria-hidden="true" class="flex-shrink-0"
                                 style="color: {% if 'conversaciones/metricas' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 0 1-.825-.242m9.345-8.334a2.126 2.126 0 0 0-.476-.095 48.64 48.64 0 0 0-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0 0 11.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/>
                            </svg>
                            Dashboard Conversaciones
                        </a>
                    </div>
                </div>
            </template>

            {# Colapsado: link directo #}
            <template x-if="sidebarCollapsed">
                <a href="{% url 'legajos:dashboard_contactos' %}"
                   class="group flex items-center justify-center transition-colors duration-150"
                   style="padding: 10px 14px; border-radius: 9999px; text-decoration: none;
                          {% if 'dashboard-contactos' in pagina_actual or 'conversaciones/metricas' in pagina_actual %}
                              background: var(--bg-brand);
                          {% else %}
                              background: transparent;
                          {% endif %}"
                   title="Dashboard"
                   aria-label="Dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         width="20" height="20" aria-hidden="true"
                         style="color: {% if 'dashboard-contactos' in pagina_actual or 'conversaciones/metricas' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/>
                    </svg>
                </a>
            </template>
        </div>
        {% endif %}

        {# ── Ciudadanos ───────────────────────────────────────── #}
        {% if request.user|puede:"ciudadano.ver" %}
        <div class="relative" style="margin-bottom: 2px;">
            <a href="{% url 'legajos:ciudadanos' %}"
               class="group flex items-center transition-colors duration-150"
               :class="sidebarCollapsed ? 'justify-center' : 'gap-x-3'"
               style="padding: 10px 14px; border-radius: 9999px; text-decoration: none;
                      {% if 'legajos' in pagina_actual %}
                          background: var(--bg-brand); color: #fff; font-weight: 700;
                      {% else %}
                          background: transparent; color: var(--text-body); font-weight: 500;
                      {% endif %}
                      font-size: 13.5px; font-family: var(--font-sans);"
               {% if 'legajos' in pagina_actual %}aria-current="page"{% endif %}>
                {# users-group icon #}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                     width="20" height="20" aria-hidden="true" class="flex-shrink-0"
                     style="color: {% if 'legajos' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
                </svg>
                <template x-if="!sidebarCollapsed">
                    <span>Ciudadanos</span>
                </template>
            </a>
        </div>
        {# Ocultado a pedido — "Nuevo ciudadano" del menú lateral (el alta sigue accesible por URL) #}
        {% comment %}
        {% if request.user|puede:"ciudadano.crear" %}
        <template x-if="!sidebarCollapsed">
            <div style="margin-left: 20px; margin-bottom: 2px;">
                <a href="{% url 'legajos:ciudadano_nuevo' %}"
                   class="flex items-center gap-2 transition-colors duration-150"
                   style="padding: 8px 12px; border-radius: 9999px; text-decoration: none; font-size: 13px; font-family: var(--font-sans);
                          {% if 'ciudadanos/nuevo' in pagina_actual %}background: var(--bg-brand); color: #fff; font-weight: 700;{% else %}background: transparent; color: var(--text-body-subtle); font-weight: 500;{% endif %}"
                   {% if 'ciudadanos/nuevo' in pagina_actual %}aria-current="page"{% endif %}>
                    {# user-plus icon #}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                         width="16" height="16" aria-hidden="true" class="flex-shrink-0"
                         style="color: {% if 'ciudadanos/nuevo' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z"/>
                    </svg>
                    Nuevo ciudadano
                </a>
            </div>
        </template>
        {% endif %}
        {% endcomment %}
        {% endif %}

        {# Relevamientos (core) — feature legacy removida en development; ítem de sidebar eliminado #}

        {# Ocultado a pedido — "Conversaciones" del menú lateral #}
        {% comment %}
        {% if request.user|puede:"conversacion.operar" %}
        <div class="relative" style="margin-bottom: 2px;">
            <a href="{% url 'conversaciones:lista' %}"
               class="group flex items-center transition-colors duration-150"
               :class="sidebarCollapsed ? 'justify-center' : 'gap-x-3'"
               style="padding: 10px 14px; border-radius: 9999px; text-decoration: none;
                      {% if 'conversaciones' in pagina_actual %}
                          background: var(--bg-brand); color: #fff; font-weight: 700;
                      {% else %}
                          background: transparent; color: var(--text-body); font-weight: 500;
                      {% endif %}
                      font-size: 13.5px; font-family: var(--font-sans);"
               {% if 'conversaciones' in pagina_actual %}aria-current="page"{% endif %}>
                {# chat-bubble icon (Conversaciones) #}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                     width="20" height="20" aria-hidden="true" class="flex-shrink-0"
                     style="color: {% if 'conversaciones' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 0 1-.825-.242m9.345-8.334a2.126 2.126 0 0 0-.476-.095 48.64 48.64 0 0 0-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0 0 11.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/>
                </svg>
                <template x-if="!sidebarCollapsed">
                    <span style="flex: 1;">Conversaciones</span>
                </template>
                {% if badge_conversaciones %}
                    <template x-if="!sidebarCollapsed">
                        <span class="nav-count">{{ badge_conversaciones }}</span>
                    </template>
                    <template x-if="sidebarCollapsed">
                        <span class="nav-dot" style="position: absolute; top: 7px; right: 16px;"></span>
                    </template>
                {% endif %}
            </a>
        </div>
        {% endif %}
        {% endcomment %}

        {# ── Reportes ─────────────────────────────────────────── #}
        {% if request.user|puede:"reporte.ver" %}
        <div class="relative" style="margin-bottom: 2px;">
            <a href="{% url 'legajos:reportes' %}"
               class="group flex items-center transition-colors duration-150"
               :class="sidebarCollapsed ? 'justify-center' : 'gap-x-3'"
               style="padding: 10px 14px; border-radius: 9999px; text-decoration: none;
                      {% if 'reportes' in pagina_actual %}
                          background: var(--bg-brand); color: #fff; font-weight: 700;
                      {% else %}
                          background: transparent; color: var(--text-body); font-weight: 500;
                      {% endif %}
                      font-size: 13.5px; font-family: var(--font-sans);"
               {% if 'reportes' in pagina_actual %}aria-current="page"{% endif %}>
                {# chart-bar icon #}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                     width="20" height="20" aria-hidden="true" class="flex-shrink-0"
                     style="color: {% if 'reportes' in pagina_actual %}#fff{% else %}var(--text-body-subtle){% endif %};">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/>
                </svg>
                <template x-if="!sidebarCollapsed">
                    <span>Reportes</span>
                </template>
            </a>
        </div>
        {% endif %}

        {# ── Configuración (grupo colapsable) ─────────────────── #}
        {% if request.user|puede:"config.administrar" %}
        <div x-data="{ open: {% if 'configuracion' in pagina_actual %}true{% else %}false{% endif %} }"
             class="relative" style="margin-bottom: 2px;">

            <template x-if="!sidebarCollapsed">
                <div>
                    <button @click="open = !open"
                            class="group flex w-full items-center gap-x-3 transition-colors duration-150"
                            style="padding: 10px 14px; border-radius: 9999px; border: none; cursor: pointer;
                                   background: transparent; color: var(--text-body); font-weight: 500;
                                   font-size: 13.5px; font-family: var(--font-sans); text-align: left;">
                        {# adjustments-horizontal icon #}
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                             width="20" height="20" aria-hidden="true" class="flex-shrink-0"
                             style="color: var(--text-body-subtle);">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75"/>
                        </svg>
                        <span class="flex-1">Configuración</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                             width="14" height="14" aria-hidden="true"
                             style="color: var(--text-body-subtle); transition: transform 150ms;"
                             :style="open ? 'transform: rotate(180deg)' : ''">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
                        </svg>
                    </button>

                    <div x-show="open" x-transition style="margin-top: 2px; margin-left: 20px; display: flex; flex-direction: column; gap: 2px;">
                        <a href="{% url 'configuracion:provincias' %}"
                           class="flex items-center gap-2 transition-colors duration-150"
                           style="padding: 8px 12px; border-radius: 9999px; text-decoration: none; font-size: 13px; font-family: var(--font-sans);
                                  {% if 'provincias' in pagina_actual %}background: var(--bg-brand); color: #fff; font-weight: 700;{% else %}background: transparent; color: var(--text-body-subtle); font-weight: 500;{% endif %}"
