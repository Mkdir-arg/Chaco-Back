<!-- @startingPoint section="Backoffice" subtitle="Módulo Programa Becas (8 pantallas, flujo clickeable)" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Programa Becas — Chaco / NODO</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="icons.jsx" type="text/babel" data-presets="react"></script>
<script src="data.js"></script>
<script src="inicio-data.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg-secondary); font-family: var(--font-sans); overflow: hidden; color: var(--text-body); }
  #root { height: 100vh; }
  .scroll::-webkit-scrollbar { width: 10px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--border-base-strong); border-radius: 9999px; border: 3px solid var(--bg-secondary); }
  table { border-collapse: collapse; width: 100%; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-body-subtle); font-weight: 700; text-align: left; padding: 11px 16px; }
  td { font-size: 13.5px; color: var(--text-body); padding: 13px 16px; border-top: 1px solid var(--border-light); }
  .rowh:hover { background: var(--bg-tertiary); }
  .login-illus { display: none; }
  @media (min-width: 1024px) { .login-illus { display: flex; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const NS = window.ChacoNODODesignSystem_dc2a68;
const { Button, Card, Input, Select, StatCard, Modal, Avatar, Tabs } = NS;
const Icon = window.Icon;
const B = window.BECAS;
const cupoSum = (seg) => (seg.subsegmentos || []).reduce((a, s) => a + s.cupoMax, 0);
const ocupadoSum = (seg) => (seg.subsegmentos || []).reduce((a, s) => a + s.ocupado, 0);
const segById = (id) => B.segmentos.find((s) => s.id === id);
const subById = (seg, id) => seg && (seg.subsegmentos || []).find((s) => s.id === id);
const convCupo = (c) => { const s = segById(c.segmentoId); const ss = subById(s, c.subsegmentoId); return ss ? ss.cupoMax : (s ? s.cupoTotal : 0); };
const convOcupado = (c) => { const s = segById(c.segmentoId); const ss = subById(s, c.subsegmentoId); return ss ? ss.ocupado : (s ? ocupadoSum(s) : 0); };
const convEspera = (c) => (c.beneficiarios || []).filter((b) => b.estado === 'espera').length;

/* ---------- Badge (estilo unificado: relleno claro + borde tonal suave + texto oscuro) ---------- */
const BADGE = {
  gray:    { bg: '#F9FAFB', bd: '#E5E7EB', tx: '#374151' },
  white:   { bg: '#FFFFFF', bd: '#E5E7EB', tx: '#374151' },
  brand:   { bg: '#FFEAF6', bd: '#FFB9DC', tx: '#A11F60' },
  danger:  { bg: '#FEF0F2', bd: '#FFCCD3', tx: '#8B0836' },
  warning: { bg: '#FFF8F1', bd: '#FCD9BD', tx: '#771D1D' },
  success: { bg: '#ECFDF5', bd: '#A4F4CF', tx: '#006045' },
};
function Badge({ variant = 'gray', dot, children }) {
  const v = BADGE[variant] || BADGE.gray;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 10px', borderRadius: 9999,
      background: v.bg, border: `1px solid ${v.bd}`, color: v.tx, fontSize: 12, fontWeight: 600, lineHeight: 1.3, whiteSpace: 'nowrap' }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'currentColor' }} />}
      {children}
    </span>
  );
}

/* ---------- Toast ---------- */
const ToastCtx = React.createContext(() => {});
function ToastHost({ children }) {
  const [t, setT] = React.useState(null);
  const push = (msg, tone = 'success') => { setT({ msg, tone }); setTimeout(() => setT(null), 2600); };
  const tone = { success: { bg: 'var(--bg-success-soft)', bd: 'var(--border-success-subtle)', fg: 'var(--text-fg-success)', ic: 'checkCircle' },
                 danger: { bg: 'var(--bg-danger-soft)', bd: 'var(--border-danger-subtle)', fg: 'var(--text-fg-danger)', ic: 'xCircle' },
                 info: { bg: 'var(--bg-info-soft)', bd: 'var(--color-brand-200)', fg: 'var(--text-fg-info)', ic: 'exclamationCircle' } }[t?.tone] || {};
  return (
    <ToastCtx.Provider value={push}>
      {children}
      {t && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 80, display: 'flex', alignItems: 'center', gap: 10,
          padding: '12px 16px', background: tone.bg, border: `1px solid ${tone.bd}`, color: tone.fg, borderRadius: 12, boxShadow: 'var(--shadow-lg)', fontWeight: 600, fontSize: 14 }}>
          <Icon name={tone.ic} size={18} /> {t.msg}
        </div>
      )}
    </ToastCtx.Provider>
  );
}

/* ---------- Sidebar ---------- */
const NAV = [
  { id: 'inicio', label: 'Inicio', icon: 'home' },
  { id: 'segmentos', label: 'Segmentos', icon: 'squares' },
  { id: 'requisitos', label: 'Requisitos', icon: 'clipboardList' },
  { id: 'convocatorias', label: 'Convocatorias', icon: 'megaphone' },
  { id: 'relevamientos', label: 'Relevamientos', icon: 'folderOpen', count: 6 },
  { id: 'revision', label: 'Revisión de formularios', icon: 'clipboardCheck', count: 1 },
  { id: 'cupo', label: 'Cupo y lista de espera', icon: 'usersGroup' },
  { id: 'legajo', label: 'Legajo ciudadano', icon: 'identification' },
  { id: 'reportes', label: 'Reportes', icon: 'chartBar' },
];
function Sidebar({ active, go, collapsed, onToggle }) {
  return (
    <aside style={{ width: collapsed ? 84 : 276, flexShrink: 0, background: 'var(--bg-white)', borderRight: '1px solid var(--border-base)', display: 'flex', flexDirection: 'column', height: '100%', transition: 'width .2s var(--ease-standard)' }}>
      <div style={{ padding: 16, borderBottom: '1px solid var(--border-base)', display: 'flex', alignItems: 'center', justifyContent: collapsed ? 'center' : 'flex-start', gap: 12 }}>
        <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--bg-white)', border: '1px solid var(--border-base)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, overflow: 'hidden' }}><img src="../../assets/logo-mark.png" alt="Gobierno del Chaco" style={{ width: 32, height: 32, objectFit: 'contain' }} /></div>
        {!collapsed && (
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--text-heading)', lineHeight: 1.15, whiteSpace: 'nowrap' }}>Programa Becas</div>
            <div style={{ fontSize: 11.5, color: 'var(--text-body-subtle)', whiteSpace: 'nowrap' }}>Gobierno del Chaco</div>
          </div>
        )}
      </div>
      <div style={{ padding: collapsed ? '14px 0' : '14px 16px', borderBottom: '1px solid var(--border-base)', display: 'flex', alignItems: 'center', justifyContent: collapsed ? 'center' : 'flex-start', gap: 10 }}>
        <Avatar name={B.user.name} size={36} />
        {!collapsed && (
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-heading)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{B.user.name}</div>
            <div style={{ fontSize: 11, color: 'var(--text-body-subtle)' }}>{B.user.role}</div>
          </div>
        )}
      </div>
      <nav style={{ flex: 1, padding: 12, display: 'flex', flexDirection: 'column', gap: 2, overflowY: 'auto', overflowX: 'hidden' }} className="scroll">
        {NAV.map((n) => {
          const on = n.id === active;
          return (
            <button key={n.id} onClick={() => go(n.id)} title={collapsed ? n.label : undefined} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: collapsed ? '11px 0' : '10px 14px',
              justifyContent: collapsed ? 'center' : 'flex-start',
              border: 'none', cursor: 'pointer', borderRadius: 9999, textAlign: 'left', position: 'relative',
              background: on ? 'var(--bg-brand)' : 'transparent', color: on ? '#fff' : 'var(--text-body)',
              fontFamily: 'var(--font-sans)', fontSize: 13.5, fontWeight: on ? 700 : 500 }}
              onMouseEnter={(e) => { if (!on) e.currentTarget.style.background = 'var(--bg-tertiary)'; }}
              onMouseLeave={(e) => { if (!on) e.currentTarget.style.background = 'transparent'; }}>
              <Icon name={n.icon} size={20} style={{ color: on ? '#fff' : 'var(--text-body-subtle)' }} />
              {!collapsed && <span style={{ flex: 1 }}>{n.label}</span>}
              {!collapsed && n.count != null && <span style={{ fontSize: 11, fontWeight: 700, padding: '1px 8px', borderRadius: 9999, background: on ? 'rgba(255,255,255,.25)' : 'var(--bg-tertiary)', color: on ? '#fff' : 'var(--text-body-subtle)' }}>{n.count}</span>}
              {collapsed && n.count != null && <span style={{ position: 'absolute', top: 4, right: 14, width: 7, height: 7, borderRadius: '50%', background: on ? '#fff' : 'var(--bg-danger)' }} />}
            </button>
          );
        })}
      </nav>
      <div style={{ padding: 12, borderTop: '1px solid var(--border-base)' }}>
        <button onClick={onToggle} title={collapsed ? 'Expandir' : 'Minimizar'} style={{ width: '100%', padding: '10px', border: 'none', borderRadius: 9999, background: 'var(--bg-secondary)', color: 'var(--text-body)', cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
          <Icon name={collapsed ? 'chevronRight' : 'chevronLeft'} size={16} /> {!collapsed && 'Minimizar'}
        </button>
      </div>
    </aside>
  );
}

/* ---------- Topbar ---------- */
function Topbar({ onLogout }) {
  return (
    <header style={{ height: 64, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 16, padding: '0 24px', background: 'var(--bg-white)', borderBottom: '1px solid var(--border-base)', position: 'sticky', top: 0, zIndex: 20 }}>
      <div style={{ position: 'relative', width: 320, maxWidth: '34vw' }}>
        <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-body-subtle)' }}><Icon name="search" size={18} /></span>
        <input placeholder="Buscar ciudadano, DNI, convocatoria…" style={{ width: '100%', height: 40, padding: '0 14px 0 40px', fontFamily: 'var(--font-sans)', fontSize: 13.5, border: '1px solid var(--border-base)', borderRadius: 9999, background: 'var(--bg-secondary)', outline: 'none', color: 'var(--text-heading)' }} />
      </div>
      <div style={{ flex: 1 }} />
      <button aria-label="Alertas" style={{ position: 'relative', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-body)', padding: 6 }}>
        <Icon name="bell" size={22} />
        <span style={{ position: 'absolute', top: 2, right: 2, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 9999, background: 'var(--bg-danger)', color: '#fff', fontSize: 10, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>3</span>
      </button>
      <span title="Conectado" style={{ width: 9, height: 9, borderRadius: '50%', background: 'var(--bg-success)', boxShadow: '0 0 0 3px var(--bg-success-soft)' }} />
      <Avatar name={B.user.name} size={36} />
      <button onClick={onLogout} aria-label="Cerrar sesión" title="Cerrar sesión" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-body-subtle)', padding: 6, borderRadius: 8, display: 'inline-flex' }}
        onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--bg-secondary)'; e.currentTarget.style.color = 'var(--text-fg-danger)'; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = 'none'; e.currentTarget.style.color = 'var(--text-body-subtle)'; }}><Icon name="arrowLeft" size={20} /></button>
    </header>
  );
}

/* ---------- PageHeader ---------- */
function PageHeader({ crumb, title, subtitle, cta }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, marginBottom: 24, flexWrap: 'wrap' }}>
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12.5, color: 'var(--text-body-subtle)', marginBottom: 6 }}>
          <span>Programa Becas</span><Icon name="chevronRight" size={14} /><span style={{ color: 'var(--text-body)', fontWeight: 600 }}>{crumb}</span>
        </div>
        <h1 style={{ margin: 0, fontSize: 28, fontWeight: 800, color: 'var(--text-heading)', letterSpacing: '-0.5px' }}>{title}</h1>
        {subtitle && <p style={{ margin: '6px 0 0', fontSize: 14, color: 'var(--text-body-subtle)', maxWidth: 620 }}>{subtitle}</p>}
      </div>
      {cta}
    </div>
  );
}

/* ---------- FilterBar ---------- */
function FilterBar({ children }) {
  return <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>{children}</div>;
}
function TableCard({ children, footer }) {
  return (
    <div style={{ background: 'var(--bg-white)', border: '1px solid var(--border-base)', borderRadius: 12, boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
      <div style={{ overflowX: 'auto' }}>{children}</div>
      {footer}
    </div>
  );
}
function Pagination({ shown, total, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', borderTop: '1px solid var(--border-light)', background: 'var(--bg-secondary)' }}>
      <span style={{ fontSize: 12.5, color: 'var(--text-body-subtle)' }}>Mostrando {shown} de {total} {label}</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <Button size="sm" variant="tertiary" disabled iconNode={<Icon name="chevronLeft" size={16} />}>Anterior</Button>
        <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-body)' }}>1 de 1</span>
        <Button size="sm" variant="tertiary" iconRight=" " >Siguiente</Button>
      </div>
    </div>
  );
}
function IconBtn({ name, label, onClick, tone = 'var(--text-fg-brand)' }) {
  return <button onClick={onClick} aria-label={label} title={label} style={{ background: 'none', border: 'none', cursor: 'pointer', color: tone, padding: 6, borderRadius: 8, display: 'inline-flex' }}
    onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-secondary)'} onMouseLeave={(e) => e.currentTarget.style.background = 'none'}><Icon name={name} size={20} /></button>;
}
function EmptyState({ icon, title, msg, cta }) {
  return (
    <div style={{ padding: '56px 24px', textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
      <div style={{ color: 'var(--text-fg-brand)' }}><Icon name={icon} size={48} /></div>
      <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--text-heading)' }}>{title}</div>
      {msg && <div style={{ fontSize: 14, color: 'var(--text-body)', maxWidth: 360 }}>{msg}</div>}
      {cta && <div style={{ marginTop: 6 }}>{cta}</div>}
    </div>
  );
}
function Field({ label, children, required }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-heading)' }}>{label}{required && <span style={{ color: 'var(--text-fg-danger)', marginLeft: 3 }}>*</span>}</span>
      {children}
    </label>
  );
}

/* ---------- Revisión de requisitos: ficha de respuestas (no tabla) ---------- */
function RequisitosReview({ reqs }) {
  const completos = reqs.filter((r) => r.ok).length;
  const faltan = reqs.length - completos;
  return (
    <Card title="Requisitos del segmento" subtitle="Respuestas cargadas por el territorial" padding={0}
      headerRight={<Badge variant={faltan ? 'warning' : 'success'} dot>{completos}/{reqs.length} completos</Badge>}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 1, background: 'var(--border-base)', borderTop: '1px solid var(--border-base)' }}>
        {reqs.map((r, i) => (
          <div key={i} style={{ background: 'var(--bg-white)', padding: '15px 18px', display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <span style={{ marginTop: 1, width: 26, height: 26, flexShrink: 0, borderRadius: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', background: r.ok ? 'var(--bg-success-soft)' : 'var(--bg-danger-soft)', color: r.ok ? 'var(--text-fg-success)' : 'var(--text-fg-danger)' }}>
              <Icon name={r.ok ? 'check' : 'warning'} size={15} />
            </span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 5, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 11.5, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.04em', color: 'var(--text-body-subtle)' }}>{r.nombre}</span>
                <Badge variant="white">{r.tipo}</Badge>
              </div>
              {r.ok
                ? <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-heading)', lineHeight: 1.35, wordBreak: 'break-word' }}>{r.valor}</div>
                : <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13.5, fontWeight: 600, color: 'var(--text-fg-danger)' }}><Icon name="xMark" size={14} /> Sin completar</div>}
            </div>
          </div>
        ))}
        {reqs.length % 2 === 1 && <div style={{ background: 'var(--bg-secondary)' }} />}
      </div>
    </Card>
  );
}

/* =====================================================================
   SCREENS
   ===================================================================== */

/* ---------- Requisitos panel (reused: segmento padre + subsegmento) ---------- */
function ReqTipoBadge({ tipo }) { return <Badge variant="white">{tipo}</Badge>; }
function RequisitosPanel({ target, scope, refresh, push }) {
  const [modal, setModal] = React.useState(false);
  const blank = { pregunta: '', tipo: 'STRING', obligatorio: 'Sí', orden: '' };
  const [form, setForm] = React.useState(blank);
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const rows = [...(target.requisitos || [])].sort((a, b) => a.orden - b.orden);
  const create = () => {
    if (!form.pregunta.trim()) { push('Ingresá la pregunta', 'danger'); return; }
    target.requisitos.push({ id: Date.now(), pregunta: form.pregunta.trim(), tipo: form.tipo, obligatorio: form.obligatorio === 'Sí', orden: Number(form.orden) || rows.length + 1 });
    setModal(false); setForm(blank); refresh(); push('Requisito creado');
  };
  const del = (r) => { target.requisitos = target.requisitos.filter((x) => x.id !== r.id); refresh(); push('Requisito eliminado', 'danger'); };
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, marginBottom: 14 }}>
        <span style={{ fontSize: 13, color: 'var(--text-body-subtle)', maxWidth: 560 }}>
          {scope === 'segmento' ? 'Requisitos del segmento padre. Se heredan en los formularios de todos sus subsegmentos.' : 'Requisitos propios de este subsegmento (se suman a los heredados del segmento padre).'}
        </span>
        <Button size="sm" variant="brand" iconNode={<Icon name="plus" size={16} />} onClick={() => setModal(true)}>Nuevo requisito</Button>
      </div>
      <TableCard>
        {rows.length === 0 ? <EmptyState icon="clipboardList" title="Sin requisitos" msg="Todavía no hay requisitos configurados en este nivel." cta={<Button variant="brand" iconNode={<Icon name="plus" size={18} />} onClick={() => setModal(true)}>Nuevo requisito</Button>} /> : (
          <table>
            <thead><tr><th style={{ width: 44 }}>Orden</th><th>Pregunta</th><th>Tipo</th><th>Obligatorio</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
            <tbody>
              {rows.map((r) => (
                <tr key={r.id} className="rowh">
                  <td style={{ color: 'var(--text-body-subtle)', fontWeight: 700 }}>{r.orden}</td>
                  <td style={{ fontWeight: 600, color: 'var(--text-heading)' }}>{r.pregunta}</td>
                  <td><ReqTipoBadge tipo={r.tipo} /></td>
                  <td>{r.obligatorio ? <Badge variant="brand">Obligatorio</Badge> : <Badge variant="gray">Opcional</Badge>}</td>
                  <td><div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}><IconBtn name="pencilSquare" label="Editar" onClick={() => push('Editar requisito', 'info')} /><IconBtn name="trash" label="Eliminar" tone="var(--text-fg-danger)" onClick={() => del(r)} /></div></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </TableCard>
      {modal && (
        <Modal title="Nuevo requisito" tone="brand" onClose={() => setModal(false)} width={540}
          footer={<><Button variant="tertiary" onClick={() => setModal(false)}>Cancelar</Button><Button variant="brand" onClick={create}>Crear requisito</Button></>}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <Field label="Pregunta" required><Input placeholder="Ej: ¿Lugar de trabajo / producción?" value={form.pregunta} onChange={set('pregunta')} /></Field>
            <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 0.8fr', gap: 16 }}>
              <Field label="Tipo de campo" required><Select value={form.tipo} onChange={set('tipo')} options={B.tiposRequisito} /></Field>
              <Field label="Obligatorio" required><Select value={form.obligatorio} onChange={set('obligatorio')} options={['Sí', 'No']} /></Field>
              <Field label="Orden"><Input type="number" placeholder={String(rows.length + 1)} value={form.orden} onChange={set('orden')} /></Field>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ---------- Subsegment detail ---------- */
function SubsegmentoDetail({ seg, sub, back, refresh, push }) {
  return (
    <div>
      <Button variant="tertiary" size="sm" iconNode={<Icon name="arrowLeft" size={16} />} onClick={back} style={{ marginBottom: 16 }}>Volver al segmento</Button>
      <Card padding={20} style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
          <div style={{ width: 46, height: 46, borderRadius: 12, background: 'var(--bg-brand-soft)', color: 'var(--text-fg-brand)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="listBullet" size={24} /></div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 12, color: 'var(--text-body-subtle)' }}>Segmento padre: <strong style={{ color: 'var(--text-body)' }}>{seg.nombre}</strong></div>
            <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--text-heading)' }}>{sub.nombre}</div>
            {sub.desc && <div style={{ fontSize: 13, color: 'var(--text-body-subtle)', marginTop: 2 }}>{sub.desc}</div>}
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '.04em', color: 'var(--text-body-subtle)', fontWeight: 700 }}>Cupo</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--text-heading)' }}>{sub.ocupado} / {sub.cupoMax}</div>
          </div>
        </div>
      </Card>
      <h3 style={{ fontSize: 18, color: 'var(--text-heading)', margin: '0 0 14px' }}>Requisitos del subsegmento</h3>
      <RequisitosPanel target={sub} scope="subsegmento" refresh={refresh} push={push} />
    </div>
  );
}

/* ---------- Segment detail (3 tabs) ---------- */
function SegmentoDetail({ seg, initialTab, back, openSub, refresh, push }) {
  const [tab, setTab] = React.useState(initialTab || 'general');
  const [form, setForm] = React.useState({ nombre: seg.nombre, desc: seg.desc, cupoTotal: seg.cupoTotal, coordinador: seg.coordinador });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const [subModal, setSubModal] = React.useState(false);
  const [delSub, setDelSub] = React.useState(null);

  const ocupado = ocupadoSum(seg);
  const disponibleSeg = seg.cupoTotal - ocupado;
  const sumaCupos = cupoSum(seg);
  const excede = sumaCupos > seg.cupoTotal;

  const saveGeneral = () => {
    seg.nombre = form.nombre; seg.desc = form.desc; seg.cupoTotal = Number(form.cupoTotal) || seg.cupoTotal; seg.coordinador = form.coordinador;
    refresh(); push('Cambios guardados');
  };
  const toggleEstado = () => { seg.estado = seg.estado === 'activo' ? 'inactivo' : 'activo'; refresh(); push(seg.estado === 'activo' ? 'Segmento activado' : 'Segmento desactivado', seg.estado === 'activo' ? 'success' : 'info'); };
  const removeSub = (s) => { seg.subsegmentos = seg.subsegmentos.filter((x) => x.id !== s.id); setDelSub(null); refresh(); push('Subsegmento eliminado', 'danger'); };

  return (
    <div>
      <Button variant="tertiary" size="sm" iconNode={<Icon name="arrowLeft" size={16} />} onClick={back} style={{ marginBottom: 16 }}>Volver a segmentos</Button>
      <PageHeader crumb="Segmentos" title={seg.nombre} subtitle={seg.desc}
        cta={<Badge variant={seg.estado === 'activo' ? 'success' : 'gray'} dot={seg.estado === 'activo'}>{seg.estado === 'activo' ? 'Activo' : 'Inactivo'}</Badge>} />
      <Card padding={0}>
        <div style={{ padding: '4px 16px 0' }}>
          <Tabs value={tab} onChange={setTab} tabs={[
            { value: 'general', label: 'Información general', iconNode: <Icon name="identification" size={16} /> },
            { value: 'sub', label: 'Subsegmentos', iconNode: <Icon name="listBullet" size={16} />, count: seg.subsegmentos.length },
            { value: 'req', label: 'Requisitos del segmento', iconNode: <Icon name="clipboardList" size={16} />, count: seg.requisitos.length },
          ]} />
        </div>
        <div style={{ padding: 24 }}>
          {tab === 'general' && (
            <div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16, marginBottom: 24 }}>
                <StatCard label="Cupo total" value={seg.cupoTotal.toLocaleString('es-AR')} iconNode={<Icon name="usersGroup" size={22} />} gradientIcon />
                <StatCard label="Cupo ocupado" value={ocupado.toLocaleString('es-AR')} iconNode={<Icon name="checkCircle" size={22} />} tone="success" />
                <StatCard label="Cupo disponible" value={disponibleSeg.toLocaleString('es-AR')} iconNode={<Icon name="clock" size={22} />} tone={disponibleSeg < 0 ? 'danger' : 'brand'} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr', gap: 24, alignItems: 'start' }}>
                {/* Form column */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                  <Field label="Nombre del segmento" required><Input value={form.nombre} onChange={set('nombre')} /></Field>
                  <Field label="Descripción" required>
                    <textarea rows={3} value={form.desc} onChange={set('desc')} style={{ fontFamily: 'var(--font-sans)', fontSize: 14, padding: 12, border: '1px solid var(--border-base)', borderRadius: 8, outline: 'none', resize: 'vertical', color: 'var(--text-heading)' }} />
                  </Field>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                    <Field label="Cupo total" required><Input type="number" value={form.cupoTotal} onChange={set('cupoTotal')} /></Field>
                    <Field label="Coordinador asignado" required><Select value={form.coordinador} onChange={set('coordinador')} options={B.coordinadores.map((c) => c.nombre)} /></Field>
                  </div>
                  <div style={{ display: 'flex', gap: 10, paddingTop: 16, borderTop: '1px solid var(--border-light)', marginTop: 4 }}>
                    <Button variant="brand" iconNode={<Icon name="check" size={18} />} onClick={saveGeneral}>Guardar cambios</Button>
                    <Button variant={seg.estado === 'activo' ? 'danger' : 'secondary'} iconNode={<Icon name={seg.estado === 'activo' ? 'xCircle' : 'checkCircle'} size={18} />} onClick={toggleEstado}>
                      {seg.estado === 'activo' ? 'Desactivar segmento' : 'Activar segmento'}
                    </Button>
                  </div>
                </div>

                {/* Aside column */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <Card title="Ocupación del cupo">
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}>
                      <span style={{ color: 'var(--text-body)' }}>{ocupado.toLocaleString('es-AR')} de {seg.cupoTotal.toLocaleString('es-AR')}</span>
                      <span style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{Math.round((ocupado / seg.cupoTotal) * 100)}%</span>
                    </div>
                    <div style={{ height: 10, borderRadius: 9999, background: 'var(--bg-tertiary)' }}>
                      <div style={{ width: Math.min(100, Math.round((ocupado / seg.cupoTotal) * 100)) + '%', height: '100%', borderRadius: 9999, background: 'var(--gradient-brand)' }} />
                    </div>
                    <div style={{ marginTop: 12, fontSize: 12.5, color: 'var(--text-body-subtle)' }}>{disponibleSeg.toLocaleString('es-AR')} lugares disponibles</div>
                  </Card>
                  <Card title="Resumen">
                    {[['Estado', <Badge variant={seg.estado === 'activo' ? 'success' : 'gray'} dot={seg.estado === 'activo'}>{seg.estado === 'activo' ? 'Activo' : 'Inactivo'}</Badge>],
                      ['Coordinador', form.coordinador],
                      ['Subsegmentos', String(seg.subsegmentos.length)],
                      ['Requisitos', String(seg.requisitos.length)]].map(([k, v], i, arr) => (
                      <div key={k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, padding: '9px 0', borderBottom: i < arr.length - 1 ? '1px solid var(--border-light)' : 'none', fontSize: 13.5 }}>
                        <span style={{ color: 'var(--text-body-subtle)' }}>{k}</span>
                        <span style={{ fontWeight: 600, color: 'var(--text-heading)', textAlign: 'right' }}>{v}</span>
                      </div>
                    ))}
                  </Card>
                </div>
              </div>
            </div>
          )}

          {tab === 'sub' && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                <span style={{ fontSize: 13, color: 'var(--text-body-subtle)' }}>Cada subsegmento tiene su propio cupo. La suma no puede superar el cupo del segmento.</span>
                <Button size="sm" variant="brand" iconNode={<Icon name="plus" size={16} />} onClick={() => setSubModal(true)}>Nuevo subsegmento</Button>
              </div>
              <TableCard footer={
                <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8, padding: '12px 16px', borderTop: '1px solid var(--border-light)', background: 'var(--bg-secondary)' }}>
                  <Icon name={excede ? 'warning' : 'checkCircle'} size={16} style={{ color: excede ? 'var(--text-fg-danger)' : 'var(--text-fg-success)' }} />
                  <span style={{ fontSize: 13, fontWeight: 700, color: excede ? 'var(--text-fg-danger)' : 'var(--text-fg-success)' }}>Suma de cupos: {sumaCupos.toLocaleString('es-AR')} / {seg.cupoTotal.toLocaleString('es-AR')}</span>
                </div>
              }>
                {seg.subsegmentos.length === 0 ? <EmptyState icon="listBullet" title="Sin subsegmentos" msg="Agregá el primer subsegmento y asignale su cupo." cta={<Button variant="brand" iconNode={<Icon name="plus" size={18} />} onClick={() => setSubModal(true)}>Nuevo subsegmento</Button>} /> : (
                  <table>
                    <thead><tr><th>Nombre</th><th>Descripción</th><th style={{ textAlign: 'right' }}>Cupo máximo</th><th style={{ textAlign: 'right' }}>Ocupado</th><th style={{ textAlign: 'right' }}>Disponible</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
                    <tbody>
                      {seg.subsegmentos.map((s) => (
                        <tr key={s.id} className="rowh">
                          <td style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{s.nombre}</td>
                          <td style={{ maxWidth: 240, color: 'var(--text-body-subtle)' }}>{s.desc || '—'}</td>
                          <td style={{ textAlign: 'right' }}>{s.cupoMax.toLocaleString('es-AR')}</td>
                          <td style={{ textAlign: 'right' }}>{s.ocupado.toLocaleString('es-AR')}</td>
                          <td style={{ textAlign: 'right', fontWeight: 700, color: 'var(--text-heading)' }}>{(s.cupoMax - s.ocupado).toLocaleString('es-AR')}</td>
                          <td>
                            <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
                              <IconBtn name="pencilSquare" label="Editar" onClick={() => push('Editar subsegmento', 'info')} />
                              <Button size="xs" variant="tertiary" iconNode={<Icon name="clipboardList" size={15} />} onClick={() => openSub(s)}>Requisitos {s.requisitos.length ? `(${s.requisitos.length})` : ''}</Button>
                              <IconBtn name="trash" label="Eliminar" tone="var(--text-fg-danger)" onClick={() => setDelSub(s)} />
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </TableCard>
            </div>
          )}

          {tab === 'req' && <RequisitosPanel target={seg} scope="segmento" refresh={refresh} push={push} />}
        </div>
      </Card>

      {subModal && <NuevoSubsegmentoModal seg={seg} onClose={() => setSubModal(false)} refresh={refresh} push={push} />}
      {delSub && (
        <Modal title="Eliminar subsegmento" tone="danger" onClose={() => setDelSub(null)} width={460}
          footer={<><Button variant="tertiary" onClick={() => setDelSub(null)}>Cancelar</Button><Button variant="danger" onClick={() => removeSub(delSub)}>Eliminar</Button></>}>
          ¿Eliminar el subsegmento <strong>{delSub.nombre}</strong>? Se quitan también sus requisitos propios. Esta acción no se puede deshacer.
        </Modal>
      )}
    </div>
  );
}

function NuevoSubsegmentoModal({ seg, onClose, refresh, push }) {
  const [form, setForm] = React.useState({ nombre: '', desc: '', cupoMax: '' });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const disponible = seg.cupoTotal - cupoSum(seg);
  const val = Number(form.cupoMax) || 0;
  const excede = val > disponible;
  const err = excede ? `No podés asignar más de ${disponible.toLocaleString('es-AR')} (disponible: ${disponible.toLocaleString('es-AR')})` : '';
  const create = () => {
    if (!form.nombre.trim()) { push('Ingresá el nombre', 'danger'); return; }
    if (val <= 0) { push('Ingresá un cupo máximo válido', 'danger'); return; }
    if (excede) { push(err, 'danger'); return; }
    seg.subsegmentos.push({ id: Date.now(), nombre: form.nombre.trim(), desc: form.desc.trim(), cupoMax: val, ocupado: 0, requisitos: [] });
    onClose(); refresh(); push('Subsegmento creado');
  };
  return (
    <Modal title="Nuevo subsegmento" tone="brand" onClose={onClose} width={540}
      footer={<><Button variant="tertiary" onClick={onClose}>Cancelar</Button><Button variant="brand" onClick={create}>Crear subsegmento</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <Field label="Nombre" required><Input placeholder="Ej: Ladrillo" value={form.nombre} onChange={set('nombre')} /></Field>
        <Field label="Descripción"><Input placeholder="Opcional" value={form.desc} onChange={set('desc')} /></Field>
        <Field label="Cupo máximo" required>
          <Input type="number" placeholder={`Disponible: ${disponible}`} value={form.cupoMax} onChange={set('cupoMax')} error={err} />
        </Field>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', borderRadius: 10, background: excede ? 'var(--bg-danger-soft)' : 'var(--bg-secondary)', border: `1px solid ${excede ? 'var(--border-danger-subtle)' : 'var(--border-base)'}` }}>
          <Icon name={excede ? 'warning' : 'checkCircle'} size={16} style={{ color: excede ? 'var(--text-fg-danger)' : 'var(--text-fg-success)' }} />
          <span style={{ fontSize: 12.5, color: excede ? 'var(--text-fg-danger)' : 'var(--text-body-subtle)' }}>
            Cupo disponible en el segmento: <strong>{disponible.toLocaleString('es-AR')}</strong> de {seg.cupoTotal.toLocaleString('es-AR')}
          </span>
        </div>
      </div>
    </Modal>
  );
}

/* 1 — Segmentos / Subsegmentos (router: lista → detalle → subsegmento) */
function Segmentos() {
  const push = React.useContext(ToastCtx);
  const [view, setView] = React.useState('list');     // list | seg | sub
  const [segId, setSegId] = React.useState(null);
  const [subId, setSubId] = React.useState(null);
  const [segTab, setSegTab] = React.useState('general');
  const [newSeg, setNewSeg] = React.useState(false);
  const [, setTick] = React.useState(0);
  const refresh = () => setTick((t) => t + 1);

  const seg = B.segmentos.find((s) => s.id === segId);
  const sub = seg && (seg.subsegmentos || []).find((s) => s.id === subId);

  const openSeg = (s, tab = 'general') => { setSegId(s.id); setSegTab(tab); setView('seg'); };
  const openSub = (s) => { setSubId(s.id); setView('sub'); };

  if (view === 'sub' && seg && sub) {
    return <SubsegmentoDetail seg={seg} sub={sub} refresh={refresh} push={push} back={() => { setSegTab('sub'); setView('seg'); }} />;
  }
  if (view === 'seg' && seg) {
    return <SegmentoDetail key={`${seg.id}-${segTab}`} seg={seg} initialTab={segTab} refresh={refresh} push={push}
      back={() => setView('list')} openSub={openSub} />;
  }

  return (
    <div>
      <PageHeader crumb="Segmentos" title="Segmentos y subsegmentos"
        subtitle="Definí la estructura del programa: cada segmento tiene un cupo total, un coordinador, subsegmentos (con su propio cupo) y requisitos que se heredan a los formularios."
        cta={<Button variant="brand" iconNode={<Icon name="plus" size={18} />} onClick={() => setNewSeg(true)}>Nuevo segmento</Button>} />
      <TableCard footer={<Pagination shown={B.segmentos.length} total={B.segmentos.length} label="segmentos" />}>
        <table>
          <thead><tr><th>Nombre</th><th>Descripción</th><th style={{ textAlign: 'right' }}>Cupo total</th><th>Subsegmentos</th><th>Coordinador</th><th>Estado</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
          <tbody>
            {B.segmentos.map((s) => (
              <tr key={s.id} className="rowh" style={{ cursor: 'pointer' }} onClick={() => openSeg(s)}>
                <td style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{s.nombre}</td>
                <td style={{ maxWidth: 260, color: 'var(--text-body-subtle)' }}>{s.desc}</td>
                <td style={{ textAlign: 'right', fontWeight: 600, color: 'var(--text-heading)' }}>{s.cupoTotal.toLocaleString('es-AR')}</td>
                <td>{s.subsegmentos.length ? `${s.subsegmentos.length} subsegmento${s.subsegmentos.length > 1 ? 's' : ''}` : '—'}</td>
                <td><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={s.coordinador} size={26} /><span style={{ fontSize: 13 }}>{s.coordinador}</span></div></td>
                <td><Badge variant={s.estado === 'activo' ? 'success' : 'gray'} dot={s.estado === 'activo'}>{s.estado === 'activo' ? 'Activo' : 'Inactivo'}</Badge></td>
                <td onClick={(e) => e.stopPropagation()}>
                  <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end', alignItems: 'center' }}>
                    <IconBtn name="pencilSquare" label="Editar" onClick={() => openSeg(s, 'general')} />
                    <IconBtn name="chevronRight" label="Ver detalle" tone="var(--text-body-subtle)" onClick={() => openSeg(s)} />
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </TableCard>

      {newSeg && <NuevoSegmentoModal onClose={() => setNewSeg(false)} push={push} refresh={refresh} openSeg={openSeg} />}
    </div>
  );
}

function NuevoSegmentoModal({ onClose, push, refresh, openSeg }) {
  const [form, setForm] = React.useState({ nombre: '', desc: '', cupoTotal: '', coordinador: '' });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const create = () => {
    if (!form.nombre.trim() || !form.desc.trim() || !form.cupoTotal || !form.coordinador) { push('Completá los campos obligatorios', 'danger'); return; }
    const nuevo = { id: Date.now(), nombre: form.nombre.trim(), desc: form.desc.trim(), cupoTotal: Number(form.cupoTotal), coordinador: form.coordinador, estado: 'activo', requisitos: [], subsegmentos: [] };
    B.segmentos.push(nuevo);
    onClose(); refresh(); push('Segmento creado · agregá sus subsegmentos');
    openSeg(nuevo, 'sub');
  };
  return (
    <Modal title="Nuevo segmento" tone="brand" onClose={onClose} width={560}
      footer={<><Button variant="tertiary" onClick={onClose}>Cancelar</Button><Button variant="brand" onClick={create}>Guardar y configurar</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <Field label="Nombre del segmento" required><Input placeholder="Ej: Producción Territorial / Fuego y Barro" value={form.nombre} onChange={set('nombre')} /></Field>
        <Field label="Descripción" required>
          <textarea rows={2} placeholder="Población objetivo del segmento" value={form.desc} onChange={set('desc')} style={{ fontFamily: 'var(--font-sans)', fontSize: 14, padding: 12, border: '1px solid var(--border-base)', borderRadius: 8, outline: 'none', resize: 'vertical', color: 'var(--text-heading)' }} />
        </Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: 16 }}>
          <Field label="Cupo total" required><Input type="number" placeholder="Ej: 500" value={form.cupoTotal} onChange={set('cupoTotal')} /></Field>
          <Field label="Coordinador asignado" required><Select placeholder="Seleccioná…" value={form.coordinador} onChange={set('coordinador')} options={B.coordinadores.map((c) => c.nombre)} /></Field>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', borderRadius: 10, background: 'var(--bg-info-soft)', border: '1px solid var(--color-brand-200)' }}>
          <Icon name="exclamationCircle" size={16} style={{ color: 'var(--text-fg-info)' }} />
          <span style={{ fontSize: 12.5, color: 'var(--text-body)' }}>Después de guardar vas a poder cargar los subsegmentos y sus cupos en el detalle.</span>
        </div>
      </div>
    </Modal>
  );
}

/* 2 — Requisitos nativos */
function Requisitos() {
  const push = React.useContext(ToastCtx);
  const [seg, setSeg] = React.useState('Nivel Superior');
  const [modal, setModal] = React.useState(false);

    <div>
      <PageHeader crumb="Requisitos" title="Requisitos por segmento"

      <FilterBar>

                <tr key={r.id} className="rowh">
                  <td style={{ fontWeight: 600, color: 'var(--text-heading)' }}>{r.nombre}</td>

      {modal && (
        <Modal title="Nuevo requisito" tone="brand" onClose={() => setModal(false)} width={520}

          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <Field label="Nombre del requisito" required><Input placeholder="Ej: Certificado de alumno regular" /></Field>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <Field label="Tipo de campo" required><Select placeholder="Seleccioná…" options={['Texto', 'Número', 'Fecha', 'Selección', 'Sí / No', 'Archivo']} /></Field>
              <Field label="Segmento" required><Select value={seg} options={B.segmentos.map((s) => s.nombre)} /></Field>
            </div>
            <Field label="¿Es obligatorio?"><Select placeholder="Sí" options={['Sí', 'No']} /></Field>
          </div>
        </Modal>
      )}

  );
}

/* 3 — Convocatorias */
/* ---------- Requisitos informativos (colapsable, solo lectura) ---------- */
function RequisitosInformativos({ conv, open: defaultOpen }) {
  const [open, setOpen] = React.useState(defaultOpen || false);
  const s = segById(conv.segmentoId); const ss = subById(s, conv.subsegmentoId);
  const generales = B.requisitosGenerales.map((p) => ({ pregunta: p, tipo: 'STRING' }));
  const segReqs = (s ? s.requisitos : []);
  const subReqs = (ss ? ss.requisitos : []);
  const total = generales.length + segReqs.length + subReqs.length;

  const tipoChip = (t) => <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '.03em', color: 'var(--text-fg-brand)', background: 'var(--bg-brand-soft)', borderRadius: 6, padding: '2px 7px' }}>{t}</span>;

  const Section = ({ title, sub, items, link, startAt }) => (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '10px 14px', background: 'var(--bg-secondary)' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <span style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--text-heading)' }}>{title}</span>
          <span style={{ fontSize: 11.5, color: 'var(--text-body-subtle)' }}>{sub}</span>
        </div>
        {link && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, fontSize: 11.5, color: 'var(--text-fg-brand)', fontWeight: 600 }}>{link}<Icon name="chevronRight" size={12} /></span>}
      </div>
      {items.length === 0
        ? <div style={{ padding: '12px 14px', fontSize: 12.5, color: 'var(--text-body-subtle)', fontStyle: 'italic' }}>Sin requisitos en este nivel.</div>
        : items.map((r, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '9px 14px', borderTop: '1px solid var(--border-light)' }}>
            <span style={{ width: 22, height: 22, flexShrink: 0, borderRadius: 6, background: 'var(--bg-tertiary)', color: 'var(--text-body-subtle)', fontSize: 11, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{startAt + i}</span>
            <span style={{ flex: 1, fontSize: 13.5, color: 'var(--text-heading)', fontWeight: 500 }}>{r.pregunta}{r.obligatorio && <span style={{ color: 'var(--text-fg-danger)', marginLeft: 4 }}>*</span>}</span>
            {tipoChip(r.tipo)}
          </div>
        ))}
    </div>
  );

  return (
    <div style={{ border: '1px solid var(--border-base)', borderRadius: 12, overflow: 'hidden' }}>
      <button onClick={() => setOpen((o) => !o)} style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '12px 16px', background: 'var(--bg-white)', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13.5, fontWeight: 700, color: 'var(--text-heading)' }}>
          <Icon name="clipboardList" size={18} style={{ color: 'var(--text-fg-brand)' }} /> Vista previa del formulario
          <span style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--text-fg-brand)', background: 'var(--bg-brand-soft)', borderRadius: 9999, padding: '1px 9px' }}>{total} preguntas</span>
        </span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--text-body-subtle)', fontWeight: 500 }}>solo lectura <Icon name={open ? 'chevronDown' : 'chevronRight'} size={18} /></span>
      </button>
      {open && (
        <div style={{ borderTop: '1px solid var(--border-base)' }}>
          <Section title="Datos generales del programa" sub={`${generales.length} preguntas`} link="Configuración" items={generales} startAt={1} />
          <Section title={`Requisitos del segmento`} sub={s ? s.nombre : ''} link="Ver segmento" items={segReqs} startAt={generales.length + 1} />
          {ss && <Section title="Requisitos del subsegmento" sub={ss.nombre} link="Ver subsegmento" items={subReqs} startAt={generales.length + segReqs.length + 1} />}
        </div>
      )}
    </div>
  );
}

/* ---------- Modal crear/editar convocatoria ---------- */
function ConvocatoriaModal({ conv, onClose, onSave, push }) {
  const editing = !!conv;
  const [form, setForm] = React.useState(conv
    ? { nombre: conv.nombre, desc: conv.desc, segmentoId: conv.segmentoId, subsegmentoId: conv.subsegmentoId, desde: '', hasta: '' }
    : { nombre: '', desc: '', segmentoId: '', subsegmentoId: '', desde: '', hasta: '' });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const seg = segById(Number(form.segmentoId));
  const subs = seg ? (seg.subsegmentos || []) : [];
  const ss = subById(seg, Number(form.subsegmentoId));
  const cupo = ss ? ss.cupoMax : (seg ? seg.cupoTotal : null);
  const onSeg = (e) => setForm((f) => ({ ...f, segmentoId: e.target.value, subsegmentoId: '' }));
  const fakeConv = seg ? { segmentoId: seg.id, subsegmentoId: Number(form.subsegmentoId) || null } : null;
  const save = () => {
    if (!form.nombre.trim() || !form.segmentoId) { push('Completá nombre y segmento', 'danger'); return; }
    if (subs.length && !form.subsegmentoId) { push('Elegí un subsegmento', 'danger'); return; }
    onSave(form, editing);
  };
  return (
    <Modal title={editing ? 'Editar convocatoria' : 'Nueva convocatoria'} tone="brand" onClose={onClose} width={680}
      footer={<><Button variant="tertiary" onClick={onClose}>Cancelar</Button><Button variant="brand" onClick={save}>{editing ? 'Guardar cambios' : 'Guardar y configurar'}</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <Field label="Nombre de la convocatoria" required><Input placeholder="Ej: Convocatoria Becas 2026 - Producción" value={form.nombre} onChange={set('nombre')} /></Field>
        <Field label="Descripción"><textarea rows={2} placeholder="Objetivo de la convocatoria" value={form.desc} onChange={set('desc')} style={{ fontFamily: 'var(--font-sans)', fontSize: 14, padding: 12, border: '1px solid var(--border-base)', borderRadius: 8, outline: 'none', resize: 'vertical', color: 'var(--text-heading)' }} /></Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Segmento" required><Select value={form.segmentoId} onChange={onSeg} placeholder="Seleccioná…" options={B.segmentos.filter((s) => s.estado === 'activo').map((s) => ({ value: String(s.id), label: s.nombre }))} /></Field>
          {subs.length > 0 && (
            <Field label="Subsegmento" required><Select value={form.subsegmentoId} onChange={set('subsegmentoId')} placeholder={seg ? 'Seleccioná…' : 'Elegí un segmento primero'} options={subs.map((s) => ({ value: String(s.id), label: s.nombre }))} /></Field>
          )}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, alignItems: 'end' }}>
          <Field label="Fecha de inicio" required><Input type="date" value={form.desde} onChange={set('desde')} /></Field>
          <Field label="Fecha de fin" required><Input type="date" value={form.hasta} onChange={set('hasta')} error={form.desde && form.hasta && form.hasta <= form.desde ? 'Debe ser posterior al inicio' : ''} /></Field>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-heading)', marginBottom: 6 }}>Cupo asignado</div>
            <div style={{ height: 42, display: 'flex', alignItems: 'center', padding: '0 14px', borderRadius: 8, background: 'var(--bg-secondary)', border: '1px solid var(--border-base)', fontWeight: 800, color: cupo != null ? 'var(--text-heading)' : 'var(--text-body-subtle)' }}>
              {cupo != null ? cupo.toLocaleString('es-AR') : '—'}
            </div>
          </div>
        </div>
        {fakeConv && <RequisitosInformativos conv={fakeConv} />}
      </div>
    </Modal>
  );
}

/* ---------- Modal nuevo/reasignar relevamiento ---------- */
function RelevamientoModal({ conv, reasign, onClose, onSave, push }) {
  const seg = segById(conv.segmentoId); const ss = subById(seg, conv.subsegmentoId);
  const nextNum = String((conv.relevamientos.reduce((m, r) => Math.max(m, parseInt(r.nombre.replace(/\D/g, '')) || 0), 0)) + 1).padStart(3, '0');
  const [form, setForm] = React.useState(reasign
    ? { nombre: reasign.nombre, territorial: '', plazo: reasign.plazo, zona: reasign.zona }
    : { nombre: `Relevamiento ${nextNum}`, territorial: '', plazo: '', zona: '' });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const save = () => {
    if (!form.territorial || (!reasign && (!form.plazo || !form.zona.trim()))) { push('Completá los campos obligatorios', 'danger'); return; }
    onSave(form, reasign); 
  };
  return (
    <Modal title={reasign ? `Reasignar — ${reasign.nombre}` : 'Nuevo relevamiento'} tone="brand" onClose={onClose} width={560}
      footer={<><Button variant="tertiary" onClick={onClose}>Cancelar</Button><Button variant="brand" onClick={save}>{reasign ? 'Reasignar' : 'Guardar'}</Button></>}>
      <div style={{ background: 'var(--bg-secondary)', borderRadius: 10, padding: '10px 14px', marginBottom: 18, fontSize: 12.5, color: 'var(--text-body)' }}>
        <strong style={{ color: 'var(--text-heading)' }}>Convocatoria:</strong> {conv.nombre} · <strong style={{ color: 'var(--text-heading)' }}>Segmento:</strong> {seg ? seg.nombre : '—'}{ss ? ` · ${ss.nombre}` : ''}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {!reasign && <Field label="Nombre" required><Input value={form.nombre} onChange={set('nombre')} /></Field>}
        <Field label="Territorial asignado" required><Select value={form.territorial} onChange={set('territorial')} placeholder="Seleccioná…" options={B.territoriales} /></Field>
        {!reasign && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.3fr', gap: 16 }}>
            <Field label="Fecha / Plazo" required><Input type="date" value={form.plazo} onChange={set('plazo')} helper={`Dentro de ${conv.desde} – ${conv.hasta}`} /></Field>
            <Field label="Zona / Localidad" required><Input placeholder="Ej: Resistencia - Zona Norte" value={form.zona} onChange={set('zona')} /></Field>
          </div>
        )}
      </div>
    </Modal>
  );
}

/* ---------- Revisión de un formulario (caso a caso) ---------- */
function RevisionFormulario({ conv, rel, form, back, push }) {
  const f = B.formulario;
  const rn = B.renaperEstados[form.renaper];
  const fe = B.formEstados[form.estado];
  const [reject, setReject] = React.useState(false);
  const [estado, setEstado] = React.useState(form.estado);
  const faltan = f.requisitos.filter((r) => !r.ok).length;
  const aprobar = () => { form.estado = 'APROBADO'; setEstado('APROBADO'); push('Formulario aprobado · beneficiario con cupo'); };

  return (
    <div>
      <Button variant="tertiary" size="sm" iconNode={<Icon name="arrowLeft" size={16} />} onClick={back} style={{ marginBottom: 16 }}>Volver a formularios</Button>
      <PageHeader crumb={`${rel.nombre}`} title={form.ciudadano}
        subtitle={`${conv.nombre} · DNI ${form.dni}`}
        cta={<Badge variant={B.formEstados[estado].variant} dot={B.formEstados[estado].dot}>{B.formEstados[estado].label}</Badge>} />

      {/* Banda RENAPER */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', marginBottom: 20, borderRadius: 12,
        background: `var(--bg-${rn.variant === 'success' ? 'success' : rn.variant === 'warning' ? 'warning' : 'danger'}-soft)`,
        border: `1px solid var(--border-${rn.variant === 'success' ? 'success' : rn.variant === 'warning' ? 'warning' : 'danger'}-subtle)`,
        color: `var(--text-fg-${rn.variant === 'success' ? 'success' : rn.variant === 'warning' ? 'warning' : 'danger'})` }}>
        <Icon name={rn.icon} size={20} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13.5, fontWeight: 700 }}>{rn.label}</div>
          <div style={{ fontSize: 12.5, opacity: .85 }}>{rn.variant === 'success' ? 'Identidad confirmada contra el Registro Nacional de las Personas.' : rn.variant === 'warning' ? 'Validación de identidad pendiente — reintentá o cargá manualmente.' : 'Los datos no coinciden con RENAPER. Revisá antes de aprobar.'}</div>
        </div>
        {rn.variant !== 'success' && <Button size="sm" variant="secondary" iconNode={<Icon name="arrowPath" size={16} />} onClick={() => push('Reintentando validación RENAPER…', 'info')}>Reintentar</Button>}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.7fr 1fr', gap: 20, alignItems: 'start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <Card title="Cuestionario social" subtitle="Preguntas generales del programa">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
              {f.social.map((q, i) => (
                <div key={i}><div style={{ fontSize: 11.5, textTransform: 'uppercase', letterSpacing: '.04em', color: 'var(--text-body-subtle)', fontWeight: 700, marginBottom: 3 }}>{q.p}</div><div style={{ fontSize: 14, color: 'var(--text-heading)', fontWeight: 600 }}>{q.r}</div></div>
              ))}
            </div>
          </Card>
          <RequisitosReview reqs={f.requisitos} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <Card title="Resolución del caso">
            {estado === 'APROBADO' ? (
              <div style={{ display: 'flex', gap: 10, padding: 12, background: 'var(--bg-success-soft)', border: '1px solid var(--border-success-subtle)', borderRadius: 10, color: 'var(--text-fg-success)' }}>
                <Icon name="checkCircle" size={18} /><span style={{ fontSize: 13 }}>Formulario aprobado. El ciudadano pasó a beneficiario con cupo.</span>
              </div>
            ) : (
              <>
                {faltan > 0 && (
                  <div style={{ display: 'flex', gap: 10, padding: 12, marginBottom: 14, background: 'var(--bg-warning-soft)', border: '1px solid var(--border-warning-subtle)', borderRadius: 10, color: 'var(--text-fg-warning)' }}>
                    <Icon name="warning" size={18} /><span style={{ fontSize: 13, lineHeight: 1.45 }}>{faltan} requisito(s) sin completar. Podés aprobar con observación o rechazar para que el territorial lo corrija.</span>
                  </div>
                )}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <Button variant="brand" block iconNode={<Icon name="check" size={18} />} onClick={aprobar}>Aprobar formulario</Button>
                  <Button variant="danger" block iconNode={<Icon name="xMark" size={18} />} onClick={() => setReject(true)}>Rechazar</Button>
                </div>
              </>
            )}
          </Card>
          <Card title="Datos del caso">
            {[['DNI', form.dni], ['Edad', f.edad + ' años'], ['Territorial', rel.territorial], ['Presentado', form.presentado]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid var(--border-light)', fontSize: 13.5 }}><span style={{ color: 'var(--text-body-subtle)' }}>{k}</span><span style={{ fontWeight: 600, color: 'var(--text-heading)' }}>{v}</span></div>
            ))}
          </Card>
          <Card title="Historial de ediciones" subtitle="TracaFormulario">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {f.historial.map((h, i) => (
                <div key={i} style={{ display: 'flex', gap: 12, paddingBottom: i < f.historial.length - 1 ? 16 : 0 }}>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <span style={{ width: 10, height: 10, borderRadius: '50%', background: 'var(--bg-brand)', marginTop: 4 }} />
                    {i < f.historial.length - 1 && <span style={{ flex: 1, width: 2, background: 'var(--border-base)' }} />}
                  </div>
                  <div><div style={{ fontSize: 13, color: 'var(--text-heading)', fontWeight: 600 }}>{h.accion}</div><div style={{ fontSize: 11.5, color: 'var(--text-body-subtle)' }}>{h.quien} · {h.cuando}</div></div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </div>
      {reject && (
        <Modal title="Rechazar formulario" tone="danger" onClose={() => setReject(false)} width={520}
          footer={<><Button variant="tertiary" onClick={() => setReject(false)}>Cancelar</Button><Button variant="danger" onClick={() => { setReject(false); form.estado = 'RECHAZADO'; setEstado('RECHAZADO'); push('Formulario devuelto al territorial', 'danger'); }}>Confirmar rechazo</Button></>}>
          <p style={{ marginTop: 0, fontSize: 13.5 }}>El caso vuelve al territorial en estado <strong>EN_CURSO</strong> con el motivo indicado.</p>
          <Field label="Motivo del rechazo" required>
            <textarea rows={3} placeholder="Ej: falta adjuntar la constancia de CBU." style={{ fontFamily: 'var(--font-sans)', fontSize: 14, padding: 12, border: '1px solid var(--border-base)', borderRadius: 8, outline: 'none', resize: 'vertical', color: 'var(--text-heading)' }} />
          </Field>
        </Modal>
      )}
    </div>
  );
}

/* 3 — Convocatorias (router: lista → detalle) */
function Convocatorias({ openRevision }) {

  const [view, setView] = React.useState('list');
  const [convId, setConvId] = React.useState(null);
  const [tab, setTab] = React.useState('general');
  const [modal, setModal] = React.useState(false);
  const [, setTick] = React.useState(0);
  const refresh = () => setTick((t) => t + 1);

  const conv = B.convocatorias.find((c) => c.id === convId);
  const open = (c, t = 'general') => { setConvId(c.id); setTab(t); setView('detail'); };

  const createConv = (form) => {
    const nuevo = { id: Date.now(), nombre: form.nombre.trim(), desc: form.desc.trim(), segmentoId: Number(form.segmentoId), subsegmentoId: Number(form.subsegmentoId) || null, desde: form.desde || '—', hasta: form.hasta || '—', estado: 'inactiva', creada: '18/06/2026', creadoPor: 'Admin — M. González', relevamientos: [], beneficiarios: [] };
    B.convocatorias.push(nuevo); setModal(false); refresh(); push('Convocatoria creada'); open(nuevo, 'general');
  };

  if (view === 'detail' && conv) {
    return <ConvocatoriaDetail key={conv.id + tab} conv={conv} initialTab={tab} refresh={refresh} push={push}
      back={() => setView('list')} openRevision={openRevision} />;
  }

  return (
    <div>
      <PageHeader crumb="Convocatorias" title="Convocatorias"
        subtitle="Períodos de inscripción por segmento y subsegmento. Cada convocatoria agrupa relevamientos y beneficiarios."
        cta={<Button variant="brand" iconNode={<Icon name="plus" size={18} />} onClick={() => setModal(true)}>Nueva convocatoria</Button>} />
      <TableCard footer={<Pagination shown={B.convocatorias.length} total={B.convocatorias.length} label="convocatorias" />}>
        <table>
          <thead><tr><th>Nombre</th><th>Segmento</th><th>Subsegmento</th><th>Período</th><th>Relevamientos</th><th>Estado</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
          <tbody>
            {B.convocatorias.map((c) => {
              const e = B.convEstados[c.estado]; const s = segById(c.segmentoId); const ss = subById(s, c.subsegmentoId);
              return (
                <tr key={c.id} className="rowh" style={{ cursor: 'pointer' }} onClick={() => open(c)}>
                  <td style={{ fontWeight: 700, color: 'var(--text-heading)', maxWidth: 240 }}>{c.nombre}</td>
                  <td>{s ? s.nombre : '—'}</td>
                  <td>{ss ? ss.nombre : '—'}</td>
                  <td style={{ whiteSpace: 'nowrap' }}>{c.desde} – {c.hasta}</td>
                  <td><span style={{ color: 'var(--text-fg-brand)', fontWeight: 600 }}>{c.relevamientos.length} relevamiento{c.relevamientos.length !== 1 ? 's' : ''}</span></td>
                  <td><Badge variant={e.variant} dot={e.dot}>{e.label}</Badge></td>
                  <td onClick={(ev) => ev.stopPropagation()}>
                    <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end', alignItems: 'center' }}>
                      <IconBtn name="eye" label="Ver detalle" onClick={() => open(c)} />
                      <IconBtn name="pencilSquare" label="Editar" onClick={() => open(c, 'general')} />
                      <IconBtn name={c.estado === 'activa' ? 'xCircle' : 'checkCircle'} label={c.estado === 'activa' ? 'Desactivar' : 'Activar'} tone={c.estado === 'activa' ? 'var(--text-fg-danger)' : 'var(--text-fg-success)'}
                        onClick={() => { c.estado = c.estado === 'activa' ? 'inactiva' : 'activa'; refresh(); push(c.estado === 'activa' ? 'Convocatoria activada' : 'Convocatoria desactivada', c.estado === 'activa' ? 'success' : 'info'); }} />
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </TableCard>
      {modal && <ConvocatoriaModal onClose={() => setModal(false)} onSave={createConv} push={push} />}
    </div>
  );
}

/* ---------- Beneficiarios (solapa 3) ---------- */
function Beneficiarios({ conv, refresh, push }) {
  const [filtro, setFiltro] = React.useState('');
  const [baja, setBaja] = React.useState(null);
  const [liberado, setLiberado] = React.useState(false);
  const rows = conv.beneficiarios.filter((b) => !filtro || b.estado === filtro);
  const hayDisponible = convCupo(conv) - convOcupado(conv) > 0 || liberado;

  const darBaja = (b) => { b.estado = 'baja'; conv.beneficiarios = conv.beneficiarios.filter((x) => x !== b); setBaja(null); setLiberado(true); refresh(); push('Beneficiario dado de baja · se liberó un cupo', 'danger'); };
  const promover = (b) => { b.estado = 'cupo'; setLiberado(false); refresh(); push(`${b.nombre} promovido a beneficiario con cupo`); };

  return (
    <div>
      {liberado && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', marginBottom: 16, background: 'var(--bg-warning-soft)', border: '1px solid var(--border-warning-subtle)', borderRadius: 12, color: 'var(--text-fg-warning)' }}>
          <Icon name="exclamationCircle" size={18} />
          <span style={{ flex: 1, fontSize: 13.5 }}>Se liberó un cupo. ¿Querés promover a alguien de la lista de espera?</span>
          <Button size="xs" variant="tertiary" onClick={() => setLiberado(false)}>Ahora no</Button>
        </div>
      )}
      <FilterBar>
        <div style={{ width: 220 }}><Field label="Estado"><Select value={filtro} onChange={(e) => setFiltro(e.target.value)} placeholder="Todos los estados" options={Object.keys(B.benefEstados).map((k) => ({ value: k, label: B.benefEstados[k].label }))} /></Field></div>
        <div style={{ flex: 1 }} />
        <Button variant="tertiary" iconNode={<Icon name="download" size={18} />} onClick={() => push('Beneficiarios exportados')}>Exportar</Button>
      </FilterBar>
      <TableCard footer={<Pagination shown={rows.length} total={conv.beneficiarios.length} label="beneficiarios" />}>
        {rows.length === 0 ? <EmptyState icon="usersGroup" title="Sin beneficiarios" msg="Todavía no hay personas aprobadas en esta convocatoria." /> : (
          <table>
            <thead><tr><th>DNI</th><th>Nombre y apellido</th><th>Estado</th><th>Fecha aprobación</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
            <tbody>
              {rows.map((b, i) => {
                const be = B.benefEstados[b.estado];
                return (
                  <tr key={i} className="rowh">
                    <td style={{ color: 'var(--text-body-subtle)' }}>{b.dni}</td>
                    <td><div style={{ display: 'flex', alignItems: 'center', gap: 10 }}><Avatar name={b.nombre} size={30} /><span style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{b.nombre}</span></div></td>
                    <td><Badge variant={be.variant} dot={be.dot}>{be.label}</Badge></td>
                    <td>{b.fecha}</td>
                    <td>
                      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                        <IconBtn name="eye" label="Ver legajo" onClick={() => push('Abrir legajo del ciudadano', 'info')} />
                        {b.estado === 'cupo' && <Button size="xs" variant="danger" onClick={() => setBaja(b)}>Dar de baja</Button>}
                        {b.estado === 'espera' && <Button size="xs" variant="tertiary" iconNode={<Icon name="check" size={15} />} disabled={!hayDisponible} onClick={() => promover(b)}>Promover</Button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </TableCard>
      {baja && (
        <Modal title="Dar de baja beneficiario" tone="danger" onClose={() => setBaja(null)} width={460}
          footer={<><Button variant="tertiary" onClick={() => setBaja(null)}>Cancelar</Button><Button variant="danger" onClick={() => darBaja(baja)}>Dar de baja</Button></>}>
          ¿Dar de baja a <strong>{baja.nombre}</strong>? Se libera su cupo y vas a poder promover a alguien de la lista de espera.
        </Modal>
      )}
    </div>
  );
}

/* ---------- Modal Nuevo / Reprogramar relevamiento (operativo) ---------- */
function OperativoModal({ reprogram, onClose, onSave, push }) {
  const convsActivas = B.convocatorias.filter((c) => c.estado === 'activa');
  const nextNum = String(B.relevamientos.length + 1).padStart(3, '0');
  const [form, setForm] = React.useState(reprogram
    ? { convocatoria: reprogram.convocatoria, territorial: reprogram.territorial, zona: reprogram.zona, fecha: '', obs: reprogram.observaciones || '' }
    : { convocatoria: '', territorial: '', zona: '', fecha: '', obs: '' });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const save = () => {
    if (reprogram) { if (!form.fecha) { push('Elegí la nueva fecha', 'danger'); return; } onSave(form, reprogram); return; }
    if (!form.convocatoria || !form.territorial || !form.zona.trim() || !form.fecha) { push('Completá los campos obligatorios', 'danger'); return; }
    onSave(form);
  };
  return (
    <Modal title={reprogram ? `Reprogramar — ${reprogram.nombre}` : 'Nuevo relevamiento'} tone="brand" onClose={onClose} width={560}
      footer={<><Button variant="tertiary" onClick={onClose}>Cancelar</Button><Button variant="brand" onClick={save}>{reprogram ? 'Reprogramar' : 'Guardar'}</Button></>}>
      {!reprogram && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', marginBottom: 18, borderRadius: 10, background: 'var(--bg-info-soft)', border: '1px solid var(--color-brand-200)' }}>
          <Icon name="exclamationCircle" size={16} style={{ color: 'var(--text-fg-info)' }} />
          <span style={{ fontSize: 12.5, color: 'var(--text-body)' }}>El relevamiento se nombra automáticamente: <strong>Relevamiento {nextNum}</strong> y queda en estado Asignado.</span>
        </div>
      )}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <Field label="Convocatoria" required><Select value={form.convocatoria} onChange={set('convocatoria')} placeholder="Seleccioná…" options={convsActivas.map((c) => c.nombre)} disabled={!!reprogram} /></Field>
        <Field label="Territorial asignado" required><Select value={form.territorial} onChange={set('territorial')} placeholder="Seleccioná…" options={B.territoriales} /></Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
          <Field label="Zona / Localidad" required><Input placeholder="Ej: Resistencia - Zona Norte" value={form.zona} onChange={set('zona')} /></Field>
          <Field label="Fecha asignada" required><Input type="date" value={form.fecha} onChange={set('fecha')} /></Field>
        </div>
        <Field label="Observaciones"><textarea rows={2} placeholder="Opcional" value={form.obs} onChange={set('obs')} style={{ fontFamily: 'var(--font-sans)', fontSize: 14, padding: 12, border: '1px solid var(--border-base)', borderRadius: 8, outline: 'none', resize: 'vertical', color: 'var(--text-heading)' }} /></Field>
      </div>
    </Modal>
  );
}

  if (persona) {

                </div>
              )}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

                  <Button variant="brand" iconNode={<Icon name="check" size={18} />} disabled={!editable} onClick={() => { op.territorial = form.territorial; op.zona = form.zona; op.observaciones = form.obs; refresh(); push('Cambios guardados'); }}>Guardar cambios</Button>
                  <Button variant="secondary" iconNode={<Icon name="arrowPath" size={18} />} onClick={() => setReasignM(true)}>Reasignar territorial</Button>
                  <Button variant="secondary" iconNode={<Icon name="clock" size={18} />} onClick={() => setReprogM(true)}>Reprogramar</Button>

                <TableCard footer={<Pagination shown={op.personas.length} total={op.personas.length} label="personas relevadas" />}>
                  <table>
                    <thead><tr><th>DNI</th><th>Nombre y apellido</th><th>Fecha de carga</th><th>Estado</th><th>RENAPER</th><th>SIS</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
                    <tbody>
                      {op.personas.map((p, i) => {
                        const pe = B.personaEstados[p.estado];
