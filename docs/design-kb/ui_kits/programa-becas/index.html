}

/* 4 — Relevamientos (router: listado de operativos → detalle) */
function Relevamientos({ openRevision }) {
  const push = React.useContext(ToastCtx);
  const [estado, setEstado] = React.useState('');
  const [openId, setOpenId] = React.useState(null);
  const [nuevo, setNuevo] = React.useState(false);
  const [reprog, setReprog] = React.useState(null);
  const [, setTick] = React.useState(0);
  const refresh = () => setTick((t) => t + 1);

  const op = B.relevamientos.find((r) => r.id === openId);
  if (op) {
    return <OperativoDetail key={op.id} op={op} refresh={refresh} push={push} back={() => setOpenId(null)} />;
  }

  const rows = B.relevamientos.filter((r) => !estado || r.estado === estado);
  const crear = (data) => {
    const num = String(B.relevamientos.length + 1).padStart(3, '0');
    const conv = B.convocatorias.find((c) => c.nombre === data.convocatoria);
    const seg = conv ? segById(conv.segmentoId) : null; const ss = conv ? subById(seg, conv.subsegmentoId) : null;
    B.relevamientos.push({ id: Date.now(), nombre: `Relevamiento ${num}`, convocatoria: data.convocatoria, segmento: seg ? seg.nombre : '', subsegmento: ss ? ss.nombre : '', territorial: data.territorial, zona: data.zona, fecha: data.fecha, estado: 'ASIGNADO', observaciones: data.obs, personas: [] });
    setNuevo(false); refresh(); push('Relevamiento creado · estado Asignado');
  };

  return (
    <div>
      <PageHeader crumb="Relevamientos" title="Relevamientos"
        subtitle="Operativos de relevamiento en territorio. Entrá a un operativo para ver las personas relevadas dentro."
        cta={<Button variant="brand" iconNode={<Icon name="plus" size={18} />} onClick={() => setNuevo(true)}>Nuevo relevamiento</Button>} />
      <FilterBar>
        <div style={{ width: 230 }}><Field label="Estado"><Select value={estado} onChange={(e) => setEstado(e.target.value)} placeholder="Todos los estados" options={Object.keys(B.relevEstados).map((k) => ({ value: k, label: B.relevEstados[k].label }))} /></Field></div>
        <div style={{ flex: 1 }} />
        <Button variant="tertiary" iconNode={<Icon name="download" size={18} />} onClick={() => push('Relevamientos exportados')}>Exportar</Button>
      </FilterBar>
      <TableCard footer={<Pagination shown={rows.length} total={B.relevamientos.length} label="relevamientos" />}>
        <table>
          <thead><tr><th>Nombre</th><th>Convocatoria</th><th>Segmento</th><th>Territorial</th><th>Zona</th><th>Fecha</th><th>Estado</th><th style={{ textAlign: 'center' }}>Relevados</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
          <tbody>
            {rows.map((r) => {
              const e = B.relevEstados[r.estado];
              const vencido = r.estado === 'VENCIDO';
              return (
                <tr key={r.id} className="rowh" style={{ cursor: 'pointer' }} onClick={() => setOpenId(r.id)}>
                  <td style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{r.nombre}</td>
                  <td style={{ maxWidth: 200 }}>{r.convocatoria}</td>
                  <td>{r.segmento}{r.subsegmento ? <div style={{ fontSize: 11.5, color: 'var(--text-body-subtle)' }}>{r.subsegmento}</div> : null}</td>
                  <td><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={r.territorial} size={26} /><span style={{ fontSize: 13 }}>{r.territorial}</span></div></td>
                  <td>{r.zona}</td>
                  <td style={{ whiteSpace: 'nowrap' }}>{r.fecha}</td>
                  <td><Badge variant={e.variant} dot={e.variant === 'success'}>{e.label}</Badge></td>
                  <td style={{ textAlign: 'center', fontWeight: 700, color: 'var(--text-heading)' }}>{r.personas.length}</td>
                  <td onClick={(ev) => ev.stopPropagation()}>
                    <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end', alignItems: 'center' }}>
                      <IconBtn name="eye" label="Ver detalle" onClick={() => setOpenId(r.id)} />
                      <IconBtn name="arrowPath" label="Reasignar" tone="var(--text-body-subtle)" onClick={() => setOpenId(r.id)} />
                      {vencido && <IconBtn name="clock" label="Reprogramar" tone="var(--text-fg-warning)" onClick={() => setReprog(r)} />}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </TableCard>
      {nuevo && <OperativoModal onClose={() => setNuevo(false)} onSave={crear} push={push} />}
      {reprog && <OperativoModal reprogram={reprog} onClose={() => setReprog(null)} push={push} onSave={(data) => { reprog.fecha = data.fecha; reprog.estado = 'ASIGNADO'; setReprog(null); refresh(); push('Operativo reprogramado'); }} />}
    </div>
  );
}

/* 5 — Revisión de formulario caso a caso */
function Revision({ caso, back }) {
  const push = React.useContext(ToastCtx);
  const f = B.formulario;
  const persona = caso && caso.persona;
  const op = caso && caso.op;
  const nombre = persona ? persona.nombre : f.ciudadano;
  const dni = persona ? persona.dni : f.dni;
  const renaper = persona ? B.renaperRes[persona.renaper] : null;
  const sis = persona ? B.sisRes[persona.sis] : null;
  const [reject, setReject] = React.useState(false);
  const faltan = f.requisitos.filter((r) => !r.ok).length;
  const bandTone = (cat) => cat.variant === 'success' ? 'success' : cat.variant === 'warning' ? 'warning' : 'danger';
  return (
    <div>
      <Button variant="tertiary" size="sm" iconNode={<Icon name="arrowLeft" size={16} />} onClick={back} style={{ marginBottom: 16 }}>Volver al relevamiento</Button>
      <PageHeader crumb={op ? op.nombre : 'Revisión de formularios'} title={nombre}
        subtitle={`${op ? op.convocatoria : f.convocatoria} · DNI ${dni}`} />
      {persona && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
          {[['Validación RENAPER', renaper], ['Validación SIS', sis]].map(([label, cat]) => {
            const t = bandTone(cat);
            return (
              <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', borderRadius: 12, background: `var(--bg-${t}-soft)`, border: `1px solid var(--border-${t}-subtle)`, color: `var(--text-fg-${t})` }}>
                <Icon name={cat.icon} size={20} />
                <div style={{ flex: 1 }}><div style={{ fontSize: 11.5, textTransform: 'uppercase', letterSpacing: '.04em', fontWeight: 700, opacity: .8 }}>{label}</div><div style={{ fontSize: 14, fontWeight: 700 }}>{cat.label}</div></div>
                {cat.variant !== 'success' && <Button size="xs" variant="secondary" iconNode={<Icon name="arrowPath" size={14} />} onClick={() => push('Reintentando validación…', 'info')}>Reintentar</Button>}
              </div>
            );
          })}
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: '1.7fr 1fr', gap: 20, alignItems: 'start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <Card title="Cuestionario social" subtitle="Preguntas globales del programa">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
              {f.social.map((q, i) => (
                <div key={i}><div style={{ fontSize: 11.5, textTransform: 'uppercase', letterSpacing: '.04em', color: 'var(--text-body-subtle)', fontWeight: 700, marginBottom: 3 }}>{q.p}</div><div style={{ fontSize: 14, color: 'var(--text-heading)', fontWeight: 600 }}>{q.r}</div></div>
              ))}
            </div>
          </Card>
          <RequisitosReview reqs={f.requisitos} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <Card title="Resolución del caso">
            {faltan > 0 && (
              <div style={{ display: 'flex', gap: 10, padding: 12, marginBottom: 14, background: 'var(--bg-warning-soft)', border: '1px solid var(--border-warning-subtle)', borderRadius: 10, color: 'var(--text-fg-warning)' }}>
                <Icon name="warning" size={18} /><span style={{ fontSize: 13, lineHeight: 1.45 }}>{faltan} requisito(s) sin completar. Podés aprobar con observación o rechazar para que el territorial lo corrija.</span>
              </div>
            )}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <Button variant="brand" block iconNode={<Icon name="check" size={18} />} onClick={() => { push('Formulario aprobado · estado TERMINADO'); }}>Aprobar formulario</Button>
              <Button variant="danger" block iconNode={<Icon name="xMark" size={18} />} onClick={() => setReject(true)}>Rechazar</Button>
            </div>
          </Card>
          <Card title="Datos del caso">
            {[['DNI', f.dni], ['Edad', f.edad + ' años'], ['Territorial', f.territorial], ['Presentado', f.presentado]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid var(--border-light)', fontSize: 13.5 }}><span style={{ color: 'var(--text-body-subtle)' }}>{k}</span><span style={{ fontWeight: 600, color: 'var(--text-heading)' }}>{v}</span></div>
            ))}
          </Card>
          <Card title="Historial de ediciones" subtitle="TracaFormulario">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {f.historial.map((h, i) => (
                <div key={i} style={{ display: 'flex', gap: 12, paddingBottom: i < f.historial.length - 1 ? 16 : 0 }}>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <span style={{ width: 10, height: 10, borderRadius: '50%', background: 'var(--bg-brand)', marginTop: 4 }} />
                    {i < f.historial.length - 1 && <span style={{ flex: 1, width: 2, background: 'var(--border-base)' }} />}
                  </div>
                  <div><div style={{ fontSize: 13, color: 'var(--text-heading)', fontWeight: 600 }}>{h.accion}</div><div style={{ fontSize: 11.5, color: 'var(--text-body-subtle)' }}>{h.quien} · {h.cuando}</div></div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </div>
      {reject && (
        <Modal title="Rechazar formulario" tone="danger" onClose={() => setReject(false)} width={520}
          footer={<><Button variant="tertiary" onClick={() => setReject(false)}>Cancelar</Button><Button variant="danger" onClick={() => { setReject(false); push('Formulario devuelto al territorial', 'danger'); }}>Confirmar rechazo</Button></>}>
          <p style={{ marginTop: 0, fontSize: 13.5 }}>El caso vuelve al territorial en estado <strong>EN_CURSO</strong> con el motivo indicado.</p>
          <Field label="Motivo del rechazo" required>
            <textarea rows={3} placeholder="Ej: falta adjuntar la constancia de CBU." style={{ fontFamily: 'var(--font-sans)', fontSize: 14, padding: 12, border: '1px solid var(--border-base)', borderRadius: 8, outline: 'none', resize: 'vertical', color: 'var(--text-heading)' }} />
          </Field>
        </Modal>
      )}
    </div>
  );
}

/* 6 — Cupo y lista de espera */
function Cupo() {
  const push = React.useContext(ToastCtx);
  const [seg, setSeg] = React.useState('Nivel Superior');
  const [confirm, setConfirm] = React.useState(null);
  const s = B.segmentos.find((x) => x.nombre === seg) || B.segmentos[0];
  const ocupado = ocupadoSum(s);
  const espera = B.espera.length;
  const pct = Math.round((ocupado / s.cupoTotal) * 100);
  return (
    <div>
      <PageHeader crumb="Cupo y lista de espera" title="Cupo y lista de espera"
        subtitle="Controlá beneficiarios activos contra el cupo del segmento y gestioná la lista de espera."
        cta={<div style={{ width: 240 }}><Select value={seg} onChange={(e) => setSeg(e.target.value)} options={B.segmentos.map((x) => x.nombre)} /></div>} />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16, marginBottom: 20 }}>
        <StatCard label="Cupo total" value={s.cupoTotal.toLocaleString('es-AR')} iconNode={<Icon name="usersGroup" size={22} />} gradientIcon />
        <StatCard label="Beneficiarios activos" value={ocupado.toLocaleString('es-AR')} iconNode={<Icon name="checkCircle" size={22} />} tone="success" />
        <StatCard label="En lista de espera" value={espera} iconNode={<Icon name="clock" size={22} />} tone="warning" alert={espera > 0} />
      </div>
      <Card title="Ocupación del cupo" style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}><span style={{ color: 'var(--text-body)' }}>{ocupado.toLocaleString('es-AR')} de {s.cupoTotal.toLocaleString('es-AR')} lugares</span><span style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{pct}%</span></div>
        <div style={{ height: 12, borderRadius: 9999, background: 'var(--bg-tertiary)' }}><div style={{ width: pct + '%', height: '100%', borderRadius: 9999, background: 'var(--gradient-brand)' }} /></div>
      </Card>
      <h3 style={{ fontSize: 18, color: 'var(--text-heading)', margin: '0 0 12px' }}>Lista de espera</h3>
      <TableCard footer={<Pagination shown={B.espera.length} total={B.espera.length} label="en espera" />}>
        {espera === 0 ? <EmptyState icon="usersGroup" title="Sin lista de espera" msg="Todos los inscriptos de este segmento tienen un lugar asignado." /> : (
          <table>
            <thead><tr><th>Ciudadano</th><th>Convocatoria</th><th>En espera desde</th><th>Prioridad</th><th style={{ textAlign: 'right' }}>Acciones</th></tr></thead>
            <tbody>
              {B.espera.map((w) => (
                <tr key={w.id} className="rowh">
                  <td><div style={{ display: 'flex', alignItems: 'center', gap: 10 }}><Avatar name={w.ciudadano} size={30} /><div><div style={{ fontWeight: 700, color: 'var(--text-heading)' }}>{w.ciudadano}</div><div style={{ fontSize: 11.5, color: 'var(--text-body-subtle)' }}>DNI {w.dni}</div></div></div></td>
                  <td style={{ maxWidth: 220 }}>{w.convocatoria}</td>
                  <td>{w.desde}</td>
                  <td><Badge variant={B.prioridades[w.prioridad]}>{w.prioridad}</Badge></td>
                  <td>
                    <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                      <Button size="xs" variant="tertiary" iconNode={<Icon name="check" size={15} />} onClick={() => push(`${w.ciudadano} promovido a beneficiario`)}>Promover</Button>
                      <Button size="xs" variant="danger" onClick={() => setConfirm(w)}>Dar de baja</Button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </TableCard>
      {confirm && (
        <Modal title="Dar de baja de la espera" tone="danger" onClose={() => setConfirm(null)} width={460}
          footer={<><Button variant="tertiary" onClick={() => setConfirm(null)}>Cancelar</Button><Button variant="danger" onClick={() => { setConfirm(null); push('Ciudadano dado de baja', 'danger'); }}>Dar de baja</Button></>}>
          ¿Querés sacar a <strong>{confirm.ciudadano}</strong> de la lista de espera? Esta acción se registra en el historial.
        </Modal>
      )}
    </div>
  );
}

                    onFocus={(e) => { e.target.style.borderColor = 'var(--border-brand)'; e.target.style.boxShadow = 'var(--ring-brand)'; }}
                    onBlur={(e) => { e.target.style.borderColor = 'var(--border-base)'; e.target.style.boxShadow = 'none'; }} />
                  <button type="button" onClick={() => setShowPass((s) => !s)} aria-label="Mostrar contraseña" style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-body-subtle)', padding: 4, display: 'flex' }}><Icon name="eye" size={18} /></button>
                </div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 13 }}>
                <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', color: 'var(--text-body)' }}>
                  <input type="checkbox" defaultChecked style={{ width: 15, height: 15, accentColor: 'var(--bg-brand)' }} /> Recordarme
                </label>
                <button type="button" style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, color: 'var(--text-fg-brand)' }}>¿Olvidaste tu contraseña?</button>
              </div>

              <button type="submit" style={{ width: '100%', height: 46, marginTop: 4, border: 'none', borderRadius: 12, background: 'var(--gradient-brand)', color: '#fff', fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: 700, cursor: 'pointer', boxShadow: 'var(--shadow-brand)' }}>Iniciar Sesión</button>
            </form>

            <div style={{ textAlign: 'center', marginTop: 20, fontSize: 13, color: 'var(--text-body-subtle)' }}>
              ¿No estás registrado? <a href="#" onClick={(e) => e.preventDefault()} style={{ color: 'var(--text-fg-brand)', fontWeight: 700, textDecoration: 'none' }}>Crear cuenta</a>
            </div>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 24 }}>
            <img src="../../assets/logo-chaco-horizontal.png" alt="Gobierno del Chaco" style={{ height: 38 }} />
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- App ---------- */
function App() {
  const [authed, setAuthed] = React.useState(false);
  const [screen, setScreen] = React.useState('inicio');
  const [nav, setNav] = React.useState(0);
  const [caso, setCaso] = React.useState(null);
  const [collapsed, setCollapsed] = React.useState(false);
  const go = (id) => { setScreen(id); setNav((n) => n + 1); if (id !== 'revision') setCaso(null); };
  const openRevision = (r) => { setCaso(r); setScreen('revision'); setNav((n) => n + 1); };
  let content;
  if (screen === 'inicio') content = <Inicio go={go} />;
  else if (screen === 'segmentos') content = <Segmentos />;
  else if (screen === 'requisitos') content = <Requisitos />;
  else if (screen === 'convocatorias') content = <Convocatorias openRevision={openRevision} />;
  else if (screen === 'relevamientos') content = <Relevamientos openRevision={openRevision} />;
  else if (screen === 'revision') content = <Revision caso={caso} back={() => go('relevamientos')} />;
  else if (screen === 'cupo') content = <Cupo />;
  else if (screen === 'legajo') content = <LegajoCiudadano />;
  else if (screen === 'reportes') content = <Reportes />;
  if (!authed) return <Login onLogin={() => { setAuthed(true); setScreen('inicio'); }} />;
  return (
    <ToastHost>
      <div style={{ display: 'flex', height: '100vh' }}>
        <Sidebar active={screen} go={go} collapsed={collapsed} onToggle={() => setCollapsed((c) => !c)} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <Topbar onLogout={() => setAuthed(false)} />
          <main className="scroll" style={{ flex: 1, overflowY: 'auto', padding: 28 }}>
            <div key={screen + '-' + nav} style={{ maxWidth: 1180, margin: '0 auto' }}>{content}</div>
          </main>
        </div>
      </div>
    </ToastHost>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
