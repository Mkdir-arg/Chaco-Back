<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select } = window.ChacoNODODesignSystem_dc2a68;

        <Input label="Localidad" defaultValue="Resistencia" disabled />

    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
