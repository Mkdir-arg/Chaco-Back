  ChevronRightIcon:
    heroicon: "ChevronRightIcon"
    use: "Breadcrumb separator, submenus"

  ChevronDownIcon:
    heroicon: "ChevronDownIcon"
    use: "Collapsed expandable submenus"

  ChevronUpIcon:
    heroicon: "ChevronUpIcon"
    use: "Expanded submenus"

  ArrowDownTrayIcon:
    heroicon: "ArrowDownTrayIcon"
