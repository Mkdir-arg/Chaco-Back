<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-white); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .g { height:108px; border-radius:var(--radius-xl); box-shadow:var(--shadow-md); display:flex; flex-direction:column; justify-content:flex-end; padding:14px; color:#fff; }
  .g b { font-size:14px; font-weight:800; }
  .g span { font-size:11px; opacity:.9; }
</style></head>
<body>
<div class="grid">
  <div class="g" style="background:var(--gradient-brand)"><b>--gradient-brand</b><span>#5059bc → #f98dff · Jacarandá → BG Pink · primary CTAs</span></div>
  <div class="g" style="background:var(--gradient-cool)"><b>--gradient-cool</b><span>#8a9a5b → #5059bc · illustration panels</span></div>
</div>
</body></html>
