<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Rosa" subtitle="Pink blossom accent, from the logo mark" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-white); font-family:var(--font-sans); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw b { font-size:11px; font-weight:700; }
  .sw span { font-size:10px; opacity:.85; font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-pink-050); color:var(--color-pink-950)"><b>050</b><span>#fef3ff</span></div>
  <div class="sw" style="background:var(--color-pink-200); color:var(--color-pink-950)"><b>200</b><span>#fee3ff</span></div>
  <div class="sw" style="background:var(--color-pink-400); color:var(--color-pink-950)"><b>400</b><span>#fcc3ff</span></div>
  <div class="sw" style="background:var(--color-pink-600); color:#fff"><b>600 · accent</b><span>#f98dff</span></div>
  <div class="sw" style="background:var(--color-pink-800); color:#fff"><b>800</b><span>#dd5fe4</span></div>
  <div class="sw" style="background:var(--color-pink-950); color:#fff"><b>950</b><span>#9b499f</span></div>
</div>
</body></html>
