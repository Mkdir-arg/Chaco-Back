<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft, low-contrast shadows + the brand glow" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:28px 24px; background:var(--bg-white); font-family:var(--font-sans); }
  .row { display:flex; gap:22px; }
  .c { text-align:center; }
  .box { width:96px; height:64px; background:var(--bg-white); border-radius:var(--radius-xl); border:1px solid var(--border-light); }
  .l { font-size:11px; color:var(--text-body-subtle); margin-top:12px; }
  .l b { display:block; color:var(--text-heading); font-size:12px; }
</style></head>
<body>
<div class="row">
  <div class="c"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="l"><b>xs</b></div></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="l"><b>sm · cards</b></div></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="l"><b>md · hover</b></div></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="l"><b>lg · dropdowns</b></div></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="l"><b>xl · modals</b></div></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="l"><b>brand glow</b></div></div>
</div>
</body></html>
