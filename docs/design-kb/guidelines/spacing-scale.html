<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid; 20px is the default gap between cards" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-white); font-family:var(--font-sans); }
  .r { display:flex; align-items:center; gap:14px; padding:3px 0; }
  .bar { height:16px; background:var(--bg-brand); border-radius:3px; }
  .l { font-size:11px; color:var(--text-body-subtle); width:118px; font-variant-numeric:tabular-nums; }
  .l b { color:var(--text-heading); }
</style></head>
<body>
  <div class="r"><div class="l"><b>1</b> · 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="r"><div class="l"><b>2</b> · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="l"><b>3</b> · 12px</div><div class="bar" style="width:12px"></div></div>
  <div class="r"><div class="l"><b>4</b> · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="l"><b>5</b> · 20px · gap</div><div class="bar" style="width:20px"></div></div>
  <div class="r"><div class="l"><b>6</b> · 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="r"><div class="l"><b>8</b> · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="r"><div class="l"><b>12</b> · 48px</div><div class="bar" style="width:48px"></div></div>
</body></html>
