<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; background:var(--bg-white); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:1fr 1fr; height:200px; }
  .cell { display:flex; align-items:center; justify-content:center; padding:28px; }
  .cell img { max-width:100%; max-height:120px; }
  .light { background:var(--bg-white); }
  .dark { background:var(--bg-navy); }
</style></head>
<body>
<div class="grid">
  <div class="cell light"><img src="../assets/logo-chaco-horizontal.png" alt="Gobierno del Chaco" /></div>
  <div class="cell dark"><img src="../assets/logo-chaco-horizontal.png" alt="Gobierno del Chaco sobre fondo oscuro" style="filter:brightness(0) invert(1)" /></div>
</div>
</body></html>
