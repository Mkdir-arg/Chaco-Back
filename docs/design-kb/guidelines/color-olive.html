<!-- @dsCard group="Colors" viewport="700x150" name="Verde Campo — olive / sage" subtitle="Field greens sampled from the leaf logo mark" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-white); font-family:var(--font-sans); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw b { font-size:11px; font-weight:700; }
  .sw span { font-size:10px; opacity:.85; font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-olive-100); color:var(--color-olive-700)"><b>100</b><span>#eef1e0</span></div>
  <div class="sw" style="background:var(--color-olive-200); color:var(--color-olive-700)"><b>200</b><span>#dde3c4</span></div>
  <div class="sw" style="background:var(--color-olive-300); color:var(--color-olive-700)"><b>300</b><span>#c8d29c</span></div>
  <div class="sw" style="background:var(--color-olive-400); color:#fff"><b>400</b><span>#a8b573</span></div>
  <div class="sw" style="background:var(--color-olive-500); color:#fff"><b>500</b><span>#8a9a5b</span></div>
  <div class="sw" style="background:var(--color-olive-600); color:#fff"><b>600</b><span>#6f7d3f</span></div>
</div>
</body></html>
