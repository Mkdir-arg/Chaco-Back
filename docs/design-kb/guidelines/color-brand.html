<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Jacarandá" subtitle="Jacaranda purple, the systematic brand color (#5059bc)" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-white); font-family:var(--font-sans); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw b { font-size:11px; font-weight:700; }
  .sw span { font-size:10px; opacity:.85; font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-brand-100); color:var(--color-brand-900)"><b>100</b><span>#ede9fe</span></div>
  <div class="sw" style="background:var(--color-brand-300); color:var(--color-brand-900)"><b>300</b><span>#c4b5fd</span></div>
  <div class="sw" style="background:var(--color-brand-500); color:#fff"><b>500 · base</b><span>#5059bc</span></div>
  <div class="sw" style="background:var(--color-brand-700); color:#fff"><b>700 · brand</b><span>#5059bc</span></div>
  <div class="sw" style="background:var(--color-brand-800); color:#fff"><b>800</b><span>#4338ca</span></div>
  <div class="sw" style="background:var(--color-brand-900); color:#fff"><b>900</b><span>#3730a3</span></div>
</div>
</body></html>
