<!-- @dsCard group="Type" viewport="700x200" name="Typefaces" subtitle="Manrope is the single typeface — UI, body and display" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-white); }
  .block { margin-bottom:18px; }
  .tag { font-family:var(--font-sans); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-body-subtle); margin-bottom:6px; }
  .sans { font-family:var(--font-sans); font-size:34px; font-weight:800; color:var(--text-heading); letter-spacing:-.4px; }
  .disp { font-family:var(--font-display); font-size:34px; font-weight:700; color:var(--text-fg-brand); }
  .meta { font-family:var(--font-sans); font-size:12px; color:var(--text-body-subtle); margin-top:4px; }
</style></head>
<body>
<div class="block">
  <div class="tag">Manrope — UI & body</div>
  <div class="sans">Gobierno del Chaco · 0123456789</div>
  <div class="meta">Regular 400 · Medium 500 · Semibold 600 · Bold 700 · Extrabold 800</div>
</div>
<div class="block">
  <div class="tag">Manrope — display (extrabold, tight tracking)</div>
  <div class="sans" style="color:var(--text-fg-brand);">Cerca tuyo, siempre</div>
  <div class="meta">Headlines &amp; hero numerals use Manrope 800 — one family across the system</div>
</div>
</body></html>
