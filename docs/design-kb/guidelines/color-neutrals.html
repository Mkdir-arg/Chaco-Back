<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-white); font-family:var(--font-sans); }
  .row { display:flex; gap:0; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--border-base); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw b { font-size:11px; font-weight:700; }
  .sw span { font-size:9.5px; opacity:.8; font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-gray-050); color:#111"><b>050</b><span>#f9fafb</span></div>
  <div class="sw" style="background:var(--color-gray-100); color:#111"><b>100</b><span>#f3f4f6</span></div>
  <div class="sw" style="background:var(--color-gray-200); color:#111"><b>200</b><span>#e5e7eb</span></div>
  <div class="sw" style="background:var(--color-gray-300); color:#111"><b>300</b><span>#d1d5db</span></div>
  <div class="sw" style="background:var(--color-gray-500); color:#fff"><b>500</b><span>#6b7280</span></div>
  <div class="sw" style="background:var(--color-gray-600); color:#fff"><b>600</b><span>#4b5563</span></div>
  <div class="sw" style="background:var(--color-navy-700); color:#fff"><b>navy</b><span>#252f40</span></div>
  <div class="sw" style="background:var(--color-gray-900); color:#fff"><b>900</b><span>#111827</span></div>
</div>
</body></html>
