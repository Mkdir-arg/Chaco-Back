<!-- @dsCard group="Brand" viewport="700x190" name="Iconography — Font Awesome" subtitle="Font Awesome 6 (solid) is the system icon set; no emoji" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-white); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(8,1fr); gap:14px; }
  .i { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .i .glyph { width:46px; height:46px; border-radius:var(--radius-lg); background:var(--bg-secondary); border:1px solid var(--border-base); display:flex; align-items:center; justify-content:center; color:var(--text-fg-brand); font-size:18px; }
  .i .n { font-size:9.5px; color:var(--text-body-subtle); }
</style></head>
<body>
<div class="grid">
  <div class="i"><div class="glyph"><i class="fas fa-house"></i></div><div class="n">house</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-folder-open"></i></div><div class="n">folder-open</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-people-roof"></i></div><div class="n">people-roof</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-hand-holding-heart"></i></div><div class="n">holding-heart</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-comments"></i></div><div class="n">comments</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-bell"></i></div><div class="n">bell</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-chart-line"></i></div><div class="n">chart-line</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-id-card"></i></div><div class="n">id-card</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-magnifying-glass"></i></div><div class="n">search</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-filter"></i></div><div class="n">filter</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-plus"></i></div><div class="n">plus</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-pen"></i></div><div class="n">pen</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-trash"></i></div><div class="n">trash</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-circle-check"></i></div><div class="n">check</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-gear"></i></div><div class="n">gear</div></div>
  <div class="i"><div class="glyph"><i class="fas fa-right-from-bracket"></i></div><div class="n">logout</div></div>
</div>
</body></html>
