<!-- @dsCard group="Brand" viewport="700x260" name="Illustration style" subtitle="Flat-vector people on sage→jacaranda gradient panels" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; background:var(--bg-white); font-family:var(--font-sans); }
  .wrap { display:flex; align-items:center; gap:24px; padding:24px; }
  .art { flex:0 0 auto; width:300px; background:linear-gradient(135deg, var(--color-olive-200), var(--color-brand-100)); border-radius:var(--radius-2xl); padding:12px; }
  .art img { width:100%; display:block; }
  .copy h4 { margin:0 0 8px; color:var(--text-heading); font-size:18px; }
  .copy p { margin:0; color:var(--text-body); font-size:13px; line-height:1.6; max-width:300px; }
</style></head>
<body>
<div class="wrap">
  <div class="art"><img src="../assets/illustration-login.png" alt="Ilustración" /></div>
  <div class="copy">
    <h4>Personas, no íconos abstractos</h4>
    <p>Ilustraciones planas y cálidas de personas colaborando, sobre paneles con degradé verde campo → jacarandá. Tonos de piel diversos, ropa en navy y blanco. Reservadas para login, estados vacíos y páginas de bienvenida del portal.</p>
  </div>
</div>
</body></html>
