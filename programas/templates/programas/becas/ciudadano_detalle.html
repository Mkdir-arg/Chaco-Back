{% extends "includes/base.html" %}
{% block title %}Becas · {{ ciudadano.nombre_completo }}{% endblock %}

{% block main-content %}
<div class="max-w-5xl mx-auto space-y-6">

  {# Page header #}
  <div class="flex items-end justify-between gap-4 flex-wrap">
    <div class="flex items-start gap-3 min-w-0">
      <a href="{% url 'legajos:ciudadano_detalle' ciudadano.pk %}"
         class="btn-tertiary btn-back-circle"
         aria-label="Volver al legajo">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
      </a>
      <div class="min-w-0">
        <h1 style="font-size:28px; font-weight:800; color:var(--text-heading); letter-spacing:-0.5px; line-height:1.15;">
          Becas &mdash; {{ ciudadano.nombre_completo }}
        </h1>
        <p style="font-size:14px; color:var(--text-body-subtle); margin-top:4px;">
          DNI {{ ciudadano.dni }}
        </p>
      </div>
    </div>
  </div>

  {% include "programas/becas/_resumen_ciudadano.html" %}

</div>
{% endblock %}
