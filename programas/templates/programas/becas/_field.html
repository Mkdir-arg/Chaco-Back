{# Render de un campo de formulario con label, ayuda y errores. #}
<div class="mb-4">
  <label class="block text-sm font-medium text-heading mb-1" for="{{ field.id_for_label }}">
    {{ field.label }}{% if field.field.required %} <span class="text-fg-danger">*</span>{% endif %}
  </label>
  {{ field }}
  {% if field.help_text %}<p class="mt-1 text-xs text-body-subtle">{{ field.help_text }}</p>{% endif %}
  {% for error in field.errors %}<p class="mt-1 text-xs text-fg-danger">{{ error }}</p>{% endfor %}
</div>
