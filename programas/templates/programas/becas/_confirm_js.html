<!-- Confirmación destructiva con SweetAlert2. Uso: elemento con data-confirm-url. -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.addEventListener('click', function (e) {
  const btn = e.target.closest('[data-confirm-url]');
  if (!btn) return;
  e.preventDefault();
  Swal.fire({
    title: btn.dataset.confirmTitle || '¿Confirmás la acción?',
    text: btn.dataset.confirmText || '',
    icon: btn.dataset.confirmIcon || 'warning',
    showCancelButton: true,
    confirmButtonColor: '#5059bc',
    cancelButtonColor: '#6b7280',
    confirmButtonText: btn.dataset.confirmOk || 'Sí, confirmar',
    cancelButtonText: 'Cancelar',
  }).then(function (r) {
    if (!r.isConfirmed) return;
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = btn.dataset.confirmUrl;
    const csrf = document.querySelector('[name=csrfmiddlewaretoken]');
    if (csrf) {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'csrfmiddlewaretoken';
      input.value = csrf.value;
      form.appendChild(input);
    }
    document.body.appendChild(form);
    form.submit();
  });
});
</script>
