<!-- Confirmación con ModernModal (sistema de modales del backoffice). Uso: elemento con data-confirm-url. -->
<script>
document.addEventListener('click', function (e) {
  const btn = e.target.closest('[data-confirm-url]');
  if (!btn) return;
  e.preventDefault();
  const icon = btn.dataset.confirmIcon || 'warning';
  ModernModal.show({
    type: 'confirm',
    danger: icon === 'warning',
    title: btn.dataset.confirmTitle || '¿Confirmás la acción?',
    message: btn.dataset.confirmText || '',
    confirmText: btn.dataset.confirmOk || 'Sí, confirmar',
    cancelText: 'Cancelar',
    onConfirm: function () {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = btn.dataset.confirmUrl;
      const csrf = document.querySelector('[name=csrfmiddlewaretoken]');
      if (csrf) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'csrfmiddlewaretoken';
        input.value = csrf.value;
        form.appendChild(input);
      }
      document.body.appendChild(form);
      form.submit();
    }
  });
});
</script>
