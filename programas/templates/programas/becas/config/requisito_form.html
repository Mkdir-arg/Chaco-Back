{% extends "includes/base.html" %}
{% block title %}Becas · Requisito{% endblock %}

{% block main-content %}
<div class="">
  <h1 class="text-3xl font-extrabold text-heading tracking-tight mb-6">Nuevo requisito nativo</h1>
  <form method="post" class="bg-white rounded-xl border border-base shadow-sm p-6">
    {% csrf_token %}
    {% if subsegmento %}<input type="hidden" name="subsegmento" value="{{ subsegmento.pk }}">{% endif %}
    {% for field in form %}{% include "programas/becas/_field.html" %}{% endfor %}
    <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-light">
      <a href="{% if subsegmento %}{% url 'becas:subsegmento_detalle' subsegmento.pk %}{% else %}{% url 'becas:segmento_detalle' segmento.pk %}{% endif %}"
         class="btn-nodo btn-secondary btn-base">← Cancelar</a>
      <button type="submit" class="btn-nodo btn-brand btn-base">Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
