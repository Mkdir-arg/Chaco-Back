services:
  mysql:
    # 8.0.32: ultima build que corre en CPUs sin x86-64-v2 (la VM de icore-srv enmascara esos flags)
    image: mysql:8.0.32
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    env_file:
      - .env.production
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nodo-network
    mem_limit: 1500m
    memswap_limit: 2000m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "350mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - nodo-network
    mem_limit: 400m
    memswap_limit: 500m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    expose:
      - "8001"
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=prd
      - DJANGO_ENV_FILE=.env.production
      - DJANGO_SETTINGS_MODULE=config.settings_production
      - RUN_MIGRATIONS=true
      - RUN_CREAR_PROGRAMAS=true
      - RUN_COLLECTSTATIC=true
      - RUN_CREAR_SUPERADMIN=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_SSL=False
      - APP_BIND=0.0.0.0
      - APP_PORT=8001
      - APP_RUNTIME=daphne
    command: ["/app/docker-entrypoint.sh"]
    restart: unless-stopped
    networks:
      - nodo-network
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    mem_limit: 350m
    memswap_limit: 500m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket:
    build: .
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    expose:
      - "8001"
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=prd
      - DJANGO_ENV_FILE=.env.production
      - DJANGO_SETTINGS_MODULE=config.settings_production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_SSL=False
      - APP_BIND=0.0.0.0
      - APP_PORT=8001
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    restart: unless-stopped
    networks:
      - nodo-network
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    mem_limit: 300m
    memswap_limit: 500m
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 8001)); s.close()'"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/staticfiles:ro
      - ./media:/media:ro
      - ./nginx-selfsigned.crt:/etc/nginx/ssl/nginx-selfsigned.crt:ro
      - ./nginx-selfsigned.key:/etc/nginx/ssl/nginx-selfsigned.key:ro
    depends_on:
      web:
        condition: service_healthy
      websocket:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nodo-network

networks:
  nodo-network:
    driver: bridge

volumes:
  redis_data:
  mysql_data:
