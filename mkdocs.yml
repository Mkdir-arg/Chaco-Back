site_name: Chaco — Seguimiento de desarrollo
site_url: https://Mkdir-arg.github.io/Chaco/
docs_dir: docs/client
site_dir: site

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Inicio: index.md
  - Proyecto:
    - Kick Off: kickoff.md
    - Equipo: team.md
    - Metodología: methodology.md
    - Arquitectura: architecture.md
  - Sprints:
    - Todos los sprints: sprints/index.md
    - Sprint 001 — Gestión base de ciudadanos: sprints/sprint-001.md
  - Plantillas operativas:
    - Caso de prueba base: templates/caso-prueba-base.md
    - Instancia de prueba: templates/instancia-prueba.md
    - Minuta de reunión: templates/minuta-reunion.md
    - Estimación de horas: templates/estimacion.md
    - Reporte de pruebas: templates/reporte-pruebas.md
    - Acta de cierre: templates/acta-cierre.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mkdir-arg/Chaco
