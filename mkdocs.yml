site_name: Chaco — Seguimiento de desarrollo
site_url: https://Mkdir-arg.github.io/Chaco-Back/
docs_dir: docs/client
site_dir: site

# Páginas que se construyen y son accesibles por enlace, pero no aparecen en el menú.
# Las estimaciones se llegan desde "Documentos relacionados" de cada funcionalidad.
not_in_nav: |
  /funcionalidades/estimacion-programa-becas.md
  /funcionalidades/estimacion-programa-dispositivos.md

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Inicio: index.md
  - Proyecto:
    - Kick Off: kickoff.md
    - Equipo: team.md
    - Metodología: methodology.md
    - Arquitectura: architecture.md
  - Minutas:
    - minutas/index.md
    - Kickoff ICORE / Chaco - 2026-05-20: minutas/kickoff-2026-05-20.md
    - Reunión 1 — Inicio de proyecto: minutas/reunion-inicio-proyecto-2026-06-03.md
    - Reunión 2 — Roles y formularios - 2026-06-08: minutas/seguimiento-roles-formularios-2026-06-08.md
    - Reunión 3 — Estadísticas de instituciones - 2026-06-10: minutas/seguimiento-estadisticas-instituciones-2026-06-10.md
    - Reunión 4 — Becas y Legajo de Dispositivos - 2026-06-19: minutas/seguimiento-becas-dispositivos-2026-06-19.md
    - Reunión 5 — Dispositivos y merenderos - 2026-06-26: minutas/seguimiento-dispositivos-merenderos-2026-06-26.md
  - Versiones:
    - versiones/index.md
    - Version 001 - Programa Becas y roles/permisos: versiones/version-001.md
  - Financiero:
    - financiero/index.md
    - Julio 2026: financiero/mes-2026-07.md
    - Junio 2026: financiero/mes-2026-06.md
    - Detalle de tareas: financiero/detalle-tareas.md
  - Funcionalidades:
    - funcionalidades/index.md
    - Programa Becas: funcionalidades/programa-becas.md
    - Programa Dispositivos: funcionalidades/programa-dispositivos.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mkdir-arg/Chaco
