name: Mobile CI

on:
  pull_request:
    branches:
      - development
    paths:
      - "mobile/**"
      - ".github/workflows/pr-mobile.yml"

permissions:
  contents: read

jobs:
  mobile-check:
    name: Expo Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Expo Doctor
        run: npx expo-doctor
