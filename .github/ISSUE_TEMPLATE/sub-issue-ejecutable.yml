name: "Sub-issue ejecutable"
description: "Tarea corta y concreta de desarrollo, derivada de un análisis. De una funcionalidad salen N."
title: "[TASK] "
labels: ["task"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Sub-issue ejecutable
        **Corto y concreto.** Un dev tiene que entenderlo en 30 segundos:
        qué se quiere, qué requisitos cumplir y cuándo está aprobado.
        Si no entra en eso, partilo en varios sub-issues.

  - type: input
    id: epica_padre
    attributes:
      label: "Épica padre"
      placeholder: "Ej: #45"
    validations:
      required: true

  - type: input
    id: analisis_origen
    attributes:
      label: "Análisis de origen"
      placeholder: "Ej: #78"
    validations:
      required: true

  - type: textarea
    id: que_se_quiere
    attributes:
      label: "Qué se quiere"
      description: "El objetivo concreto de esta tarea, en 1-3 líneas. Sin vueltas."
      placeholder: "Agregar un filtro por programa en la lista de ciudadanos del backoffice."
    validations:
      required: true

  - type: textarea
    id: requisitos
    attributes:
      label: "Requisitos"
      description: "Lo que la tarea tiene que tener/cumplir. Bullets concretos."
      placeholder: |
        - El filtro aparece arriba de la tabla, junto a los filtros existentes.
        - Lista solo los programas activos.
        - Al elegir un programa, la tabla se filtra sin recargar la página.
    validations:
      required: true

  - type: textarea
    id: criterios_aprobacion
    attributes:
      label: "Criterios de aprobación"
      description: "Checklist verificable. Si todos se cumplen, la tarea está aprobada."
      placeholder: |
        - [ ] Seleccionar un programa muestra solo los ciudadanos de ese programa.
        - [ ] Sin programa seleccionado, se ven todos.
        - [ ] No rompe los filtros que ya existían.
    validations:
      required: true

  - type: textarea
    id: archivos_afectados
    attributes:
      label: "Archivos / módulos afectados"
      description: "Pista para arrancar rápido (del estado del código relevado en el análisis)."
      placeholder: |
        - legajos/views.py
        - templates/legajos/lista.html

  - type: input
    id: estimacion_horas
    attributes:
      label: "Estimación (horas)"
      placeholder: "Ej: 3"
    validations:
      required: true

  - type: input
    id: pr_vinculada
    attributes:
      label: "PR vinculada"
      placeholder: "Ej: #321"
