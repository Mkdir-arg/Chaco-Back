{% extends 'portal/base.html' %}

{% block title %}Contraseña restablecida - Portal Ciudadano{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white p-8 animate-fadeInUp text-center" style="border-radius: var(--radius-2xl); box-shadow: var(--shadow-sm); border: 1px solid var(--border-base);">
        <div class="inline-flex items-center justify-center w-16 h-16 mb-6" style="border-radius: var(--radius-xl); background: var(--bg-success-soft);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--text-fg-success);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold mb-3" style="color: var(--text-heading);">¡Contraseña restablecida!</h2>
        <p class="text-sm leading-relaxed mb-8" style="color: var(--text-body-subtle);">
            Tu contraseña fue actualizada correctamente. Ya podés ingresar con tu DNI y tu nueva contraseña.
        </p>
        <a href="{% url 'portal:ciudadano_login' %}" class="btn-nodo btn-brand btn-lg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25"></path>
            </svg>
            Ingresar ahora
        </a>
    </div>
</div>
{% endblock %}
