{% extends 'portal/base.html' %}

{% block title %}Contraseña restablecida - Portal Ciudadano{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-[#E5E7EB] p-8 animate-fadeInUp text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl mb-6 bg-green-100">
            <i class="fas fa-check-circle text-green-600 text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-[#252F40] mb-3">¡Contraseña restablecida!</h2>
        <p class="text-[#8C8C8C] text-sm leading-relaxed mb-8">
            Tu contraseña fue actualizada correctamente. Ya podés ingresar con tu DNI y tu nueva contraseña.
        </p>
        <a
            href="{% url 'portal:ciudadano_login' %}"
            class="inline-flex items-center text-white font-semibold py-3 px-8 rounded-xl transition-all duration-300 shadow-md hover:shadow-xl"
            style="background: linear-gradient(90deg, #5059BC 0%, #F26DF9 100%);"
            onmouseover="this.style.background='linear-gradient(90deg, #454DA8 0%, #DB5FE2 100%)'"
            onmouseout="this.style.background='linear-gradient(90deg, #5059BC 0%, #F26DF9 100%)'">
            <i class="fas fa-sign-in-alt mr-2"></i>Ingresar ahora
        </a>
    </div>
</div>
{% endblock %}
