<!-- Botón de ayuda flotante en todas las páginas del portal -->
<div class="fixed bottom-20 right-4 z-40">
    <button onclick="document.getElementById('chat-button').click()" 
            class="p-3 rounded-full shadow-lg transition-all duration-300 animate-pulse"
            style="background: linear-gradient(180deg, #5059BC 0%, #F26DF9 100%); color: #FFFFFF;"
            onmouseover="this.style.background='linear-gradient(180deg, #454DA8 0%, #DB5FE2 100%)'"
            onmouseout="this.style.background='linear-gradient(180deg, #5059BC 0%, #F26DF9 100%)'">
        <i class="fas fa-question-circle text-lg"></i>
    </button>
</div>
