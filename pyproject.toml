[tool.ruff]
line-length = 120
exclude = ["migrations", ".venv", "staticfiles", "docs"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"config/asgi.py" = ["E402"]
"config/settings_production.py" = ["F403", "F405"]
"config/gevent_patch.py" = ["F841"]
"core/performance/*.py" = ["E722", "W291", "W293", "F841"]
"core/views/performance.py" = ["E402", "E722"]
"core/management/commands/performance_report.py" = ["W291", "W293"]
"docker/django/*.py" = ["E722", "W291", "W293"]
"legajos/services/ml_predictor.py" = ["E722", "F841"]
"scripts/compile_templates.py" = ["E402"]

[tool.bandit]
exclude_dirs = ["migrations", "tests", ".venv", "docs"]
skips = ["B101", "B104", "B110", "B311", "B404", "B603", "B607"]

[tool.coverage.run]
source = ["."]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "*/settings*",
    ".venv/*",
    "staticfiles/*",
    "docs/*",
]

[tool.coverage.report]
fail_under = 48
show_missing = true
